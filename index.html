function TrainingTodayTab({ trainingLog, runLog, exerciseRecords, onDeleteExercise, onDeleteRun }) {
  const dateKey = todayKey();
  const todayExercises = trainingLog.filter(e => e.date === dateKey);
  const todayRuns = runLog.filter(e => e.date === dateKey);
  const hasAnything = todayExercises.length > 0 || todayRuns.length > 0;
  if (!hasAnything) return (
    <div className="empty-state"><div className="empty-icon">🏋️</div><div>هنوز تمرینی برای امروز ثبت نشده</div><div style={{ fontSize: '12px', color: 'var(--text-muted)', marginTop: '6px' }}>از تب «ثبت» تمرین اضافه کنید</div></div>
  );
  return (
    <div>
      {todayExercises.length > 0 && (
        <div className="card">
          <div className="card-title">تمرین‌های قدرتی امروز</div>
          {todayExercises.map((e, i) => {
            const isPR = exerciseRecords[e.name] && e.weight && e.weight >= exerciseRecords[e.name];
            return <ExerciseEntryCard key={i} e={e} idx={i} isPR={isPR} onDelete={onDeleteExercise} />;
          })}
        </div>
      )}
      {todayRuns.length > 0 && (
        <div className="card">
          <div className="card-title">پیاده‌روی / دویدن امروز</div>
          {todayRuns.map((e, i) => <RunEntryCard key={i} e={e} idx={i} onDelete={onDeleteRun} />)}
        </div>
      )}
    </div>
  );
}

function TrainingRecordsTab({ exerciseRecords, runLog }) {
  const longestRun = runLog.length ? runLog.reduce((max, e) => e.distance > max.distance ? e : max, runLog[0]) : null;
  const fastestPace = runLog.filter(e => e.distance > 0 && e.duration > 0).reduce((best, e) => {
    const pace = e.duration / e.distance;
    return (!best || pace < best.pace) ? { ...e, pace } : best;
  }, null);
  const records = Object.entries(exerciseRecords).sort((a, b) => b[1] - a[1]);
  return (
    <div>
      {records.length > 0 ? (
        <div className="card">
          <div className="card-title">🏋️ رکورد وزن حرکات قدرتی</div>
          {records.map(([name, weight]) => (
            <div key={name} className="record-item">
              <div className="record-name">{name}</div>
              <div style={{ textAlign: 'left' }}>
                <div className="record-val">{weight} kg</div>
                <div className="record-unit">بیشترین وزن ثبت‌شده</div>
              </div>
            </div>
          ))}
        </div>
      ) : (
        <div className="empty-state"><div className="empty-icon">🏋️</div><div>هنوز رکوردی ثبت نشده</div><div style={{ fontSize: '12px', color: 'var(--text-muted)', marginTop: '6px' }}>وقتی تمرین با وزن ثبت کنید، رکوردها اینجا نمایش داده می‌شوند</div></div>
      )}
      {(longestRun || fastestPace) && (
        <div className="card">
          <div className="card-title">🏃 رکوردهای دویدن / پیاده‌روی</div>
          {longestRun && (
            <div className="record-item">
              <div><div className="record-name">طولانی‌ترین مسافت</div><div className="record-unit">{formatJalali(longestRun.date, { short: true })}</div></div>
              <div style={{ textAlign: 'left' }}><div className="record-val">{longestRun.distance} km</div><div className="record-unit">{longestRun.duration} دقیقه</div></div>
            </div>
          )}
          {fastestPace && (
            <div className="record-item">
              <div><div className="record-name">بهترین سرعت (min/km)</div><div className="record-unit">{formatJalali(fastestPace.date, { short: true })}</div></div>
              <div style={{ textAlign: 'left' }}><div className="record-val">{fastestPace.pace.toFixed(1)} min/km</div><div className="record-unit">{fastestPace.distance} km</div></div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function TrainingArchiveTab({ trainingLog, runLog, exerciseRecords }) {
  const allDates = [...new Set([
    ...trainingLog.map(e => e.date),
    ...runLog.map(e => e.date)
  ])].sort((a, b) => b.localeCompare(a));

  const [viewDate, setViewDate] = useState(allDates[0] || todayKey());

  const goDay = (delta) => {
    const idx = allDates.indexOf(viewDate);
    const nextIdx = idx + delta;
    if (nextIdx >= 0 && nextIdx < allDates.length) setViewDate(allDates[nextIdx]);
  };

  const dayExercises = trainingLog.filter(e => e.date === viewDate);
  const dayRuns = runLog.filter(e => e.date === viewDate);
  const hasData = dayExercises.length > 0 || dayRuns.length > 0;
  const curIdx = allDates.indexOf(viewDate);

  if (allDates.length === 0) return (
    <div className="empty-state"><div className="empty-icon">📅</div><div>هنوز تاریخچه‌ای ثبت نشده</div></div>
  );

  return (
    <div>
      <div className="archive-date-nav">
        <button className="archive-nav-btn" onClick={() => goDay(1)} disabled={curIdx >= allDates.length - 1} style={{ opacity: curIdx >= allDates.length - 1 ? 0.3 : 1 }}>›</button>
        <div className="archive-date-display">{formatJalali(viewDate, { full: true })}</div>
        <button className="archive-nav-btn" onClick={() => goDay(-1)} disabled={curIdx <= 0} style={{ opacity: curIdx <= 0 ? 0.3 : 1 }}>‹</button>
      </div>
      {!hasData && <div className="empty-state"><div className="empty-icon">🤷</div><div>برای این روز تمرینی ثبت نشده</div></div>}
      {dayExercises.length > 0 && (
        <div className="card">
          <div className="card-title">تمرین‌های قدرتی</div>
          {dayExercises.map((e, i) => {
            const isPR = exerciseRecords[e.name] && e.weight && e.weight >= exerciseRecords[e.name];
            return <ExerciseEntryCard key={i} e={e} idx={i} isPR={isPR} onDelete={null} />;
          })}
        </div>
      )}
      {dayRuns.length > 0 && (
        <div className="card">
          <div className="card-title">پیاده‌روی / دویدن</div>
          {dayRuns.map((e, i) => <RunEntryCard key={i} e={e} idx={i} onDelete={null} />)}
        </div>
      )}
      {allDates.length > 1 && (
        <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', marginTop: '8px' }}>
          {allDates.slice(0, 10).map(d => (
            <button key={d} className={"btn-sm" + (d === viewDate ? ' active' : '')} onClick={() => setViewDate(d)}
              style={{ fontSize: '12px', padding: '6px 12px' }}>
              {formatJalali(d, { short: true })}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

  const dateKey = todayKey();
  const todayCount = trainingLog.filter(e => e.date === dateKey).length + runLog.filter(e => e.date === dateKey).length;

    <div className="page-fade">
      <div className="page-header">

      </div>
      <div className="tabs">
        <button className={"tab" + (activeTab === 'register' ? ' active' : '')} onClick={() => setActiveTab('register')}>ثبت تمرین</button>
        <button className={"tab" + (activeTab === 'today' ? ' active' : '')} onClick={() => setActiveTab('today')}>
          امروز {todayCount > 0 ? `(${todayCount})` : ''}
        </button>
        <button className={"tab" + (activeTab === 'records' ? ' active' : '')} onClick={() => setActiveTab('records')}>رکوردها 🏆</button>
        <button className={"tab" + (activeTab === 'archive' ? ' active' : '')} onClick={() => setActiveTab('archive')}>تاریخچه 📅</button>

      {activeTab === 'today' && (

      {activeTab === 'records' && (
        <TrainingRecordsTab exerciseRecords={exerciseRecords} runLog={runLog} />

function HabitsPage({ habits, streaks, dateKey, onToggleHabit, onStreakAction }) {
  const todayHabits = habits[dateKey] || {};
  const now = new Date();
  const weekKey = `${now.getFullYear()}-W${Math.ceil(now.getDate() / 7)}`;
  const monthKey = `${now.getFullYear()}-${now.getMonth() + 1}`;
  const weeklyHabits = habits[weekKey] || {};
  const monthlyHabits = habits[monthKey] || {};
  return (
    <div className="page-fade">
      <div className="page-header"><div className="page-title">عادت‌ها</div><div className="page-sub">ردیابی عادت‌های روزانه، هفتگی و ماهانه</div></div>
      <div className="card">
        <div className="card-title">عادت‌های روزانه</div>
        {DAILY_HABITS.map(h => (
          <div key={h.id} className={"habit-item" + (todayHabits[h.id] ? ' done' : '')} onClick={() => onToggleHabit(dateKey, h.id)}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px', flex: 1 }}>
              <span style={{ fontSize: '20px' }}>{h.icon}</span>
              <span className="habit-label">{h.label}</span>
            </div>
            <div className={"habit-check"}>{todayHabits[h.id] ? '✓' : ''}</div>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="card-title">عادت‌های هفتگی</div>
        {WEEKLY_HABITS.map(h => (
          <div key={h.id} className={"habit-item" + (weeklyHabits[h.id] ? ' done' : '')} onClick={() => onToggleHabit(weekKey, h.id)}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px', flex: 1 }}>
              <span style={{ fontSize: '20px' }}>{h.icon}</span>
              <span className="habit-label">{h.label}</span>
            </div>
            <div className="habit-check">{weeklyHabits[h.id] ? '✓' : ''}</div>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="card-title">عادت‌های ماهانه</div>
        {MONTHLY_HABITS.map(h => (
          <div key={h.id} className={"habit-item" + (monthlyHabits[h.id] ? ' done' : '')} onClick={() => onToggleHabit(monthKey, h.id)}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px', flex: 1 }}>
              <span style={{ fontSize: '20px' }}>{h.icon}</span>
              <span className="habit-label">{h.label}</span>
            </div>
            <div className="habit-check">{monthlyHabits[h.id] ? '✓' : ''}</div>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="card-title">استریک‌ها 🔥</div>
        <div className="streak-row">
          {STREAK_TYPES.map(s => {
            const sd = streaks[s.id] || { current: 0, best: 0 };
            return (
              <div key={s.id} className="streak-card">
                <div className="streak-name">{s.icon} {s.label}</div>
                <div className="streak-nums">
                  <span className="streak-cur">{sd.current}</span>
                  <span className="streak-unit">روز</span>
                </div>
                <div className="streak-best">بهترین: <span>{sd.best} روز</span></div>
                <div className="streak-btns">
                  <button className="streak-btn-ok" onClick={() => onStreakAction(s.id, 'ok')}>✓ انجام شد</button>
                  <button className="streak-btn-fail" onClick={() => onStreakAction(s.id, 'fail')}>✕ قطع شد</button>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── صفحه آرشیو ───────────────────────────────────────────────────────────────
function ArchivePage({ state, waterLog, trainingLog, runLog, habits, notes, onSaveNote }) {
  const [viewDate, setViewDate] = useState(todayKey());
  const [noteText, setNoteText] = useState('');
  const [editingNote, setEditingNote] = useState(false);
  const [searchDate, setSearchDate] = useState('');

  useEffect(() => {
    setNoteText(notes[viewDate] || '');
    setEditingNote(false);
  }, [viewDate, notes]);

  const goDay = (delta) => {
    const d = new Date(viewDate + 'T12:00:00Z');
    d.setUTCDate(d.getUTCDate() + delta);
    setViewDate(d.toLocaleDateString('en-CA'));
  };

  const handleSearch = () => {
    if (searchDate) { setViewDate(searchDate); setSearchDate(''); }
  };

  const dayEntries = state.entries[viewDate] || [];
  const dayTotals = calcTotals(dayEntries);
  const dayWater = (waterLog[viewDate] || []).reduce((s, e) => s + e.ml, 0);
  const dayExercises = trainingLog.filter(e => e.date === viewDate);
  const dayRuns = runLog.filter(e => e.date === viewDate);
  const dayHabits = habits[viewDate] || {};
  const dayNote = notes[viewDate] || '';
  const isToday = viewDate === todayKey();

  return (
    <div className="page-fade">
      <div className="page-header"><div className="page-title">آرشیو</div><div className="page-sub">مرور تاریخچه روزانه</div></div>
      <div style={{ display: 'flex', gap: '10px', marginBottom: '20px', flexWrap: 'wrap' }}>
        <input type="date" value={searchDate} onChange={e => setSearchDate(e.target.value)}
          style={{ flex: 1, minWidth: '160px' }} />
        <button className="btn-sm" style={{ padding: '10px 20px' }} onClick={handleSearch}>جستجو</button>
      </div>
      <div className="archive-date-nav">
        <button className="archive-nav-btn" onClick={() => goDay(-1)}>›</button>
        <div className="archive-date-display">{formatJalali(viewDate, { full: true })}{isToday ? ' (امروز)' : ''}</div>
        <button className="archive-nav-btn" onClick={() => goDay(1)} disabled={viewDate >= todayKey()}>‹</button>
      </div>

      {dayEntries.length > 0 && (
        <div className="card archive-section">
          <div className="card-title">وعده‌های غذایی</div>
          <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '12px' }}>
            <span className="chip cal">{dayTotals.cal} kcal</span>
            <span className="chip prot">{dayTotals.prot}g پروتئین</span>
            <span className="chip carb">{dayTotals.carb}g کربو</span>
            <span className="chip fat">{dayTotals.fat}g چربی</span>
          </div>
          {dayEntries.map((e, i) => (
            <div key={i} className="entry-item">
              <span className="entry-name">{e.name}</span>
              <div className="entry-chips">
                <span className="chip cal">{e.cal}</span>
                <span className="chip prot">{e.prot}g</span>
              </div>
            </div>
          ))}
        </div>
      )}

      {dayWater > 0 && (
        <div className="card archive-section">
          <div className="card-title">آب مصرفی</div>
          <div style={{ fontSize: '24px', fontFamily: 'Playfair Display,serif', color: 'var(--water)' }}>{dayWater} ml</div>
        </div>
      )}

      {dayExercises.length > 0 && (
        <div className="card archive-section">
          <div className="card-title">تمرین قدرتی</div>
          {dayExercises.map((e, i) => (
            <div key={i} className="training-entry">
              <div className="training-entry-name">{e.name}</div>
              <div className="training-entry-stats">
                <span className="chip prot">{e.sets} ست</span>
                <span className="chip carb">{e.reps} تکرار</span>
                {e.weight && <span className="chip cal">{e.weight} kg</span>}
              </div>
            </div>
          ))}
        </div>
      )}

      {dayRuns.length > 0 && (
        <div className="card archive-section">
          <div className="card-title">پیاده‌روی / دویدن</div>
          {dayRuns.map((e, i) => (
            <div key={i} className="training-entry">
              <div className="training-entry-name">🏃 {e.distance} km</div>
              <div className="training-entry-stats">
                <span className="chip prot">{e.duration} دقیقه</span>
                {e.steps && <span className="chip carb">{e.steps} قدم</span>}
              </div>
            </div>
          ))}
        </div>
      )}

      {Object.keys(dayHabits).length > 0 && (
        <div className="card archive-section">
          <div className="card-title">عادت‌های روز</div>
          <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
            {DAILY_HABITS.filter(h => dayHabits[h.id]).map(h => (
              <span key={h.id} className="chip carb">{h.icon} {h.label}</span>
            ))}
          </div>
        </div>
      )}

      <div className="card archive-section">
        <div className="card-title">یادداشت روزانه</div>

          <>
            <textarea value={noteText} onChange={e => setNoteText(e.target.value)} placeholder="یادداشت خود را بنویسید..." />
            {isToday && <button className="btn-primary" onClick={() => { onSaveNote(viewDate, noteText); setEditingNote(false); }}>ذخیره یادداشت</button>}
          </>
        ) : (
          <>
            {dayNote ? <div className="archive-note-box">{dayNote}</div> : <div className="empty-state"><div className="empty-icon">📝</div><div>یادداشتی برای این روز ثبت نشده</div></div>}
            <button className="btn-ghost" style={{ marginTop: '12px' }} onClick={() => setEditingNote(true)}>ویرایش</button>
          </>
        )}
      </div>
    </div>
  );
}

// ─── صفحه برنامه غذایی هفتگی ──────────────────────────────────────────────────
function WeeklyMealPlanPage({ targets, mealPlan, onSaveMealPlan, showToast }) {
  const [selectedDay, setSelectedDay] = useState(0); // 0=شنبه
  const [editingSlot, setEditingSlot] = useState(null); // {day, slotId}
  const [addForm, setAddForm] = useState({ name: '', cal: '', prot: '', carb: '', fat: '' });
  const [times, setTimes] = useState({}); // {day-slotId: 'HH:MM'}
  const [showAIModal, setShowAIModal] = useState(false);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiParams, setAiParams] = useState({ goal: '', cal: '', prot: '', fat: '', carb: '' });

  // مقداردهی اولیه پارامترهای هوش مصنوعی از targets
  useEffect(() => {
    if (targets) {
      const goalLabel = '';
      setAiParams(p => ({
        ...p,
        cal: p.cal || String(targets.cal || ''),
        prot: p.prot || String(targets.prot || ''),
        fat: p.fat || String(targets.fat || ''),
        carb: p.carb || String(targets.carb || ''),
      }));
    }
  }, [targets]);

  const tg = targets || { cal: 2000, prot: 150, carb: 225, fat: 67 };

  // دریافت وعده‌های یک روز و اسلات
  const getDaySlot = (day, slotId) => (mealPlan[day] || {})[slotId] || [];
  const getDayTotals = (day) => {
    let cal = 0, prot = 0, carb = 0, fat = 0;
    WEEKLY_MEAL_SLOTS.forEach(slot => {
      getDaySlot(day, slot.id).forEach(item => {
        cal += +item.cal || 0; prot += +item.prot || 0;
        carb += +item.carb || 0; fat += +item.fat || 0;
      });
    });
    return { cal, prot, carb, fat };
  };

  const getSlotTime = (day, slotId) => {
    return times[`${day}-${slotId}`] || WEEKLY_MEAL_SLOTS.find(s => s.id === slotId)?.defaultTime || '';
  };

  const updateSlotTime = (day, slotId, val) => {
    setTimes(t => ({ ...t, [`${day}-${slotId}`]: val }));
  };

  const addMealItem = () => {
    if (!addForm.name) { showToast('نام غذا را وارد کنید'); return; }
    const { day, slotId } = editingSlot;
    const dayPlan = { ...(mealPlan[day] || {}) };
    dayPlan[slotId] = [...(dayPlan[slotId] || []), {
      name: addForm.name,
      cal: +addForm.cal || 0,
      prot: +addForm.prot || 0,
      carb: +addForm.carb || 0,
      fat: +addForm.fat || 0,
    }];
    onSaveMealPlan({ ...mealPlan, [day]: dayPlan });
    setAddForm({ name: '', cal: '', prot: '', carb: '', fat: '' });
    showToast('«' + addForm.name + '» اضافه شد ✦');
  };

  const deleteMealItem = (day, slotId, idx) => {
    const dayPlan = { ...(mealPlan[day] || {}) };
    const arr = [...(dayPlan[slotId] || [])];
    arr.splice(idx, 1);
    dayPlan[slotId] = arr;
    onSaveMealPlan({ ...mealPlan, [day]: dayPlan });
  };

  // اعتبارسنجی روزانه
  const getDayValidation = (day) => {
    const t = getDayTotals(day);
    const warnings = [];
    const THRESH = 0.2; // ۲۰٪ اختلاف
    if (t.cal > 0 || Object.values((mealPlan[day] || {})).some(a => a.length > 0)) {
      if (t.cal < tg.cal * (1 - THRESH)) warnings.push(`کالری کم (${t.cal} / ${tg.cal})`);
      if (t.cal > tg.cal * (1 + THRESH)) warnings.push(`کالری زیاد (${t.cal} / ${tg.cal})`);
      if (t.prot < tg.prot * (1 - THRESH)) warnings.push(`پروتئین کم (${Math.round(t.prot)} / ${tg.prot}g)`);
      if (t.carb > tg.carb * (1 + THRESH)) warnings.push(`کربوهیدرات زیاد (${Math.round(t.carb)} / ${tg.carb}g)`);
      if (t.fat > tg.fat * (1 + THRESH)) warnings.push(`چربی زیاد (${Math.round(t.fat)} / ${tg.fat}g)`);
    }
    return warnings;
  };

  const dayTotals = getDayTotals(selectedDay);
  const dayWarnings = getDayValidation(selectedDay);

  // تولید برنامه با هوش مصنوعی
  async function generateAIPlan() {
    setAiLoading(true);
    const actLabel = { '0': 'کم‌تحرک', '1': 'سبک', '3': 'متوسط', '6': 'سنگین' };
    const goalLabels = { cut: 'کاهش وزن', bulk: 'افزایش حجم', maintain: 'حفظ وزن', custom: 'سفارشی' };
    const prompt = `تو یک متخصص تغذیه ایرانی هستی. یک برنامه غذایی کامل هفتگی (۷ روز) برای این شخص بساز:
هدف: ${aiParams.goal || 'حفظ وزن'}
کالری روزانه هدف: ${aiParams.cal || tg.cal} kcal
پروتئین روزانه هدف: ${aiParams.prot || tg.prot} گرم
چربی روزانه هدف: ${aiParams.fat || tg.fat} گرم
کربوهیدرات روزانه هدف: ${aiParams.carb || tg.carb} گرم

برای هر روز (۷ روز، index 0 تا 6) و هر اسلات وعده، یک یا دو آیتم غذایی ایرانی و عملی بنویس.
اسلات‌های وعده: breakfast, morning_snack, lunch, pre_workout, post_workout, dinner, night_snack

پاسخ را فقط به صورت JSON خالص بده، بدون توضیح یا backtick:
{
  "0": { "breakfast": [{"name":"نام","cal":0,"prot":0,"carb":0,"fat":0}], "morning_snack": [...], "lunch": [...], "pre_workout": [...], "post_workout": [...], "dinner": [...], "night_snack": [...] },
  "1": { ... },
  "2": { ... },
  "3": { ... },
  "4": { ... },
  "5": { ... },
  "6": { ... }
}
قوانین مهم:
- غذاهای ایرانی، متنوع و در دسترس
- مقدار ماکرو هر آیتم باید واقعی و تخمین‌زده باشد
- مجموع کالری هر روز باید نزدیک به هدف باشد`;

    try {
      const text = await callGemini(prompt);
      const clean = text.replace(/```json|```/g, '').trim();
      let plan;
      try { plan = JSON.parse(clean); }
      catch { const m = text.match(/\{[\s\S]*\}/); if (m) plan = JSON.parse(m[0]); else throw new Error('parse fail'); }
      // تبدیل کلیدها به عدد برای هماهنگی
      const normalized = {};
      Object.keys(plan).forEach(k => { normalized[parseInt(k)] = plan[k]; });
      onSaveMealPlan(normalized);
      setShowAIModal(false);
      showToast('برنامه هفتگی هوش مصنوعی آماده شد ✦');
    } catch (err) {
      showToast('خطا در تولید برنامه. دوباره تلاش کنید');
    }
    setAiLoading(false);
  }

  return (
    <div className="page-fade">
      <div className="page-header">
        <div className="page-title">برنامه غذایی هفتگی</div>
        <div className="page-sub">برنامه‌ریزی و ویرایش وعده‌های هفتگی</div>
      </div>

      {/* دکمه هوش مصنوعی */}
      <button className="btn-secondary" style={{ marginBottom: '20px' }} onClick={() => setShowAIModal(true)}>
        ✦ ایجاد برنامه هفتگی با هوش مصنوعی
      </button>

      {/* خلاصه هفتگی */}
      <div className="week-summary-grid">
        {[
          { l: 'میانگین کالری', c: 'var(--cal)', u: 'kcal', key: 'cal' },
          { l: 'میانگین پروتئین', c: 'var(--prot)', u: 'g', key: 'prot' },
          { l: 'میانگین کربو', c: 'var(--carb)', u: 'g', key: 'carb' },
          { l: 'میانگین چربی', c: 'var(--fat)', u: 'g', key: 'fat' },
        ].map(m => {
          const filledDays = WEEK_DAYS_FA.map((_, i) => getDayTotals(i)).filter(t => t.cal > 0 || t.prot > 0);
          const avg = filledDays.length ? Math.round(filledDays.reduce((s, t) => s + t[m.key], 0) / filledDays.length) : 0;
          return (
            <div key={m.key} className="week-sum-box">
              <div className="week-sum-val" style={{ color: m.c }}>{avg}{m.u}</div>
              <div className="week-sum-lbl">{m.l}</div>
            </div>
          );
        })}
      </div>

      {/* انتخاب روز */}
      <div className="week-nav">
        {WEEK_DAYS_FA.map((day, i) => {
          const dt = getDayTotals(i);
          const hasData = Object.values(mealPlan[i] || {}).some(a => a.length > 0);
          const warns = getDayValidation(i);
          return (
            <button key={i} className={"week-day-btn" + (selectedDay === i ? ' active' : '')} onClick={() => { setSelectedDay(i); setEditingSlot(null); }}>
              <span className="day-name">{day}</span>
              <span className="day-cal" style={{ color: warns.length > 0 ? 'var(--fat)' : 'inherit' }}>
                {hasData ? dt.cal + ' kcal' : '—'}
                {warns.length > 0 ? ' ⚠' : ''}
              </span>
            </button>
          );
        })}
      </div>

      {/* اعتبارسنجی */}
      {dayWarnings.length > 0 && (
        <div className="plan-validate-banner warn">
          <span>⚠️</span>
          <div>
            <div style={{ fontWeight: 500, marginBottom: '4px' }}>هشدار برای {WEEK_DAYS_FA[selectedDay]}:</div>
            {dayWarnings.map((w, i) => <div key={i}>• {w}</div>)}
          </div>
        </div>
      )}
      {dayWarnings.length === 0 && Object.values(mealPlan[selectedDay] || {}).some(a => a.length > 0) && (
        <div className="plan-validate-banner ok">✓ ماکروهای {WEEK_DAYS_FA[selectedDay]} در محدوده مناسب است</div>
      )}

      {/* خلاصه روز */}
      {Object.values(mealPlan[selectedDay] || {}).some(a => a.length > 0) && (
        <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '16px' }}>
          {[
            { l: 'کالری', c: 'var(--cal)', v: dayTotals.cal, u: 'kcal', tg: tg.cal },
            { l: 'پروتئین', c: 'var(--prot)', v: Math.round(dayTotals.prot), u: 'g', tg: tg.prot },
            { l: 'کربو', c: 'var(--carb)', v: Math.round(dayTotals.carb), u: 'g', tg: tg.carb },
            { l: 'چربی', c: 'var(--fat)', v: Math.round(dayTotals.fat), u: 'g', tg: tg.fat },

            <span key={m.l} className="chip" style={{ background: 'var(--surface2)', color: m.c, border: '1px solid var(--border)', fontSize: '12px', padding: '5px 10px' }}>
              {m.l}: {m.v} / {m.tg}{m.u}
            </span>

      {/* اسلات‌های وعده */}

        const slotTime = getSlotTime(selectedDay, slot.id);
        return (
          <div key={slot.id} className="meal-slot-card">

              <div style={{ fontSize: '12px', color: 'var(--text-muted)', paddingBottom: '4px' }}>وعده‌ای ثبت نشده</div>

              <div key={idx} className="meal-item-row">

                <button className="meal-item-del" onClick={() => deleteMealItem(selectedDay, slot.id, idx)}>✕</button>
              </div>
            ))}

            {isEditing ? (
              <div style={{ marginTop: '10px' }}>
                <div style={{ marginBottom: '8px' }}>
                  <input type="text" value={addForm.name} onChange={e => setAddForm(f => ({ ...f, name: e.target.value }))}

// ─── محاسبه کالری سوزانده ────────────────────────────────────────────────────
function calcBurnedCalories(runLog, trainingLog, dateKey, weightKg) {
  const w = weightKg || 70;
  // پیاده‌روی/دویدن: MET × وزن × زمان(ساعت)
  const runCalories = runLog
    .filter(e => e.date === dateKey)
    .reduce((sum, e) => {
      // تخمین با MET: دویدن آهسته~8، تند~11، پیاده‌روی~3.5
      const pace = e.distance > 0 && e.duration > 0 ? e.duration / e.distance : 10;
      const met = pace < 6 ? 11 : pace < 8 ? 9 : pace < 12 ? 7 : 3.5;
      return sum + Math.round(met * w * (e.duration / 60));
    }, 0);
  // تمرین قدرتی: MET~5 برای تمرین متوسط
  const strengthCalories = trainingLog
    .filter(e => e.date === dateKey)
    .reduce((sum, e) => {
      // تخمین: ۵ kcal/دقیقه × تعداد ست × زمان تقریبی هر ست (۲ دقیقه + ۱ دقیقه استراحت)
      return sum + Math.round(5 * (e.sets || 1) * 3);
    }, 0);
  return { run: runCalories, strength: strengthCalories, total: runCalories + strengthCalories };
}

// ─── پنل کالری سوخته (برای داشبورد و تغذیه) ──────────────────────────────
function CalorieBurnedPanel({ runLog, trainingLog, dateKey, weightKg, consumedCal, targetCal }) {
  const [walkMins, setWalkMins] = useState('');
  const [runMins, setRunMins] = useState('');
  const [strengthMins, setStrengthMins] = useState('');
  const w = weightKg || 70;

  const autoFromLogs = calcBurnedCalories(runLog, trainingLog, dateKey, w);

  const manualBurned =
    (walkMins ? Math.round(3.5 * w * (+walkMins / 60)) : 0) +
    (runMins ? Math.round(9 * w * (+runMins / 60)) : 0) +
    (strengthMins ? Math.round(5 * w * (+strengthMins / 60)) : 0);

  const totalBurned = autoFromLogs.total + manualBurned;
  const netCal = consumedCal - totalBurned;

  return (
    <div className="card">
      <div className="card-title">🔥 تراز کالری</div>
      <div className="cal-balance-row">
        <div className="cal-balance-card consumed">
          <div className="cal-balance-label">کالری مصرفی</div>
          <div className="cal-balance-val" style={{ color: 'var(--cal)' }}>{consumedCal}</div>
          <div className="cal-balance-sub">kcal خورده‌شده</div>
        </div>
        <div className="cal-balance-card burned">
          <div className="cal-balance-label">کالری سوزانده</div>
          <div className="cal-balance-val" style={{ color: 'var(--carb)' }}>{totalBurned}</div>
          <div className="cal-balance-sub">kcal سوخته</div>
        </div>
        <div className="cal-balance-card net">
          <div className="cal-balance-label">کالری خالص</div>
          <div className="cal-balance-val" style={{ color: netCal > (targetCal || 2000) ? 'var(--cal)' : netCal < 0 ? 'var(--prot)' : 'var(--gold-light)' }}>{netCal}</div>
          <div className="cal-balance-sub">{netCal < 0 ? 'کسری' : 'مازاد'}</div>
        </div>
      </div>
      {autoFromLogs.total > 0 && (
        <div style={{ fontSize: '12px', color: 'var(--text-muted)', marginBottom: '10px', padding: '8px 12px', background: 'var(--surface2)', borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)' }}>
          ✦ از تمرین‌های ثبت‌شده: دویدن {autoFromLogs.run} + قدرتی {autoFromLogs.strength} = {autoFromLogs.total} kcal
        </div>
      )}
      <div style={{ fontSize: '12px', color: 'var(--text-muted)', marginBottom: '8px' }}>افزودن دستی فعالیت (دقیقه):</div>
      <div className="burned-inputs">
        <div className="burned-input-box">
          <div className="burned-input-label">🚶 پیاده‌روی</div>
          <input type="number" value={walkMins} onChange={e => setWalkMins(e.target.value)} placeholder="دقیقه" min="0" style={{ padding: '6px 10px', fontSize: '13px' }} />
          {walkMins > 0 && <div className="burned-est">≈ {Math.round(3.5 * w * (+walkMins / 60))} kcal</div>}
        </div>
        <div className="burned-input-box">
          <div className="burned-input-label">🏃 دویدن</div>
          <input type="number" value={runMins} onChange={e => setRunMins(e.target.value)} placeholder="دقیقه" min="0" style={{ padding: '6px 10px', fontSize: '13px' }} />
          {runMins > 0 && <div className="burned-est">≈ {Math.round(9 * w * (+runMins / 60))} kcal</div>}
        </div>
        <div className="burned-input-box">
          <div className="burned-input-label">🏋️ قدرتی</div>
          <input type="number" value={strengthMins} onChange={e => setStrengthMins(e.target.value)} placeholder="دقیقه" min="0" style={{ padding: '6px 10px', fontSize: '13px' }} />
          {strengthMins > 0 && <div className="burned-est">≈ {Math.round(5 * w * (+strengthMins / 60))} kcal</div>}
        </div>
      </div>
    </div>
  );
}

// ─── مربی هوشمند ─────────────────────────────────────────────────────────────
function AICoachPage({ state, waterLog, trainingLog, runLog, energyLog, habits, notes, streaks, exerciseRecords, mealPlan }) {
  const PERIODS = [
    { id: 'today', label: 'امروز', days: 1 },
    { id: '5d', label: '۵ روز اخیر', days: 5 },
    { id: '10d', label: '۱۰ روز اخیر', days: 10 },
    { id: '20d', label: '۲۰ روز اخیر', days: 20 },
    { id: 'week', label: 'این هفته', days: 7 },
    { id: 'month', label: 'این ماه', days: 30 },
  ];

  const [period, setPeriod] = useState('week');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(false);
  const [dataPreview, setDataPreview] = useState(null);

  const getDays = () => {
    const now = new Date();
    const sel = PERIODS.find(p => p.id === period) || PERIODS[4];
    const days = [];
    for (let i = sel.days - 1; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      days.push(d.toLocaleDateString('en-CA', { timeZone: 'Asia/Tehran' }));
    }
    return days;
  };

  const buildComprehensiveData = () => {
    const days = getDays();
    const tg = state.targets || {};
    const setup = state.setup || {};
    const wl = Array.isArray(state.weightLog) ? [...state.weightLog].sort((a, b) => a.date.localeCompare(b.date)) : [];

    // ── تغذیه ──
    let totalCal = 0, totalProt = 0, totalCarb = 0, totalFat = 0, totalWater = 0;
    let daysWithEntries = 0, daysWithWater = 0;
    let calArr = [], protArr = [], waterArr = [];
    let mealTimingData = {};

    days.forEach(d => {
      const ents = state.entries[d] || [];
      const t = calcTotals(ents);
      totalCal += t.cal; totalProt += t.prot; totalCarb += t.carb; totalFat += t.fat;
      calArr.push(t.cal); protArr.push(t.prot);
      if (ents.length > 0) daysWithEntries++;
      const wtr = (waterLog[d] || []).reduce((s, e) => s + e.ml, 0);
      totalWater += wtr; waterArr.push(wtr);
      if (wtr > 0) daysWithWater++;
      ents.forEach(e => {
        if (e.meal) mealTimingData[e.meal] = (mealTimingData[e.meal] || 0) + 1;
      });
    });
    const n = days.length;
    const avgCal = n > 0 ? Math.round(totalCal / n) : 0;
    const avgProt = n > 0 ? Math.round(totalProt / n) : 0;
    const avgCarb = n > 0 ? Math.round(totalCarb / n) : 0;
    const avgFat = n > 0 ? Math.round(totalFat / n) : 0;
    const avgWater = n > 0 ? Math.round(totalWater / n) : 0;
    const calConsistency = calArr.filter(c => c > 0 && Math.abs(c - (tg.cal || 2000)) < (tg.cal || 2000) * 0.15).length;
    const protConsistency = protArr.filter(p => p >= (tg.prot || 150) * 0.85).length;

    // ── ورزش ──
    let trainDays = 0, runDays = 0, totalRunDist = 0, totalRunTime = 0;
    let muscleGroups = {};
    let totalBurned = 0;
    days.forEach(d => {
      const dEx = trainingLog.filter(e => e.date === d);
      const dRun = runLog.filter(e => e.date === d);
      if (dEx.length > 0) trainDays++;
      if (dRun.length > 0) { runDays++; dRun.forEach(r => { totalRunDist += r.distance || 0; totalRunTime += r.duration || 0; }); }
      dEx.forEach(e => { if (e.muscle) muscleGroups[e.muscle] = (muscleGroups[e.muscle] || 0) + 1; });
      const burned = calcBurnedCalories(runLog, trainingLog, d, setup.w);
      totalBurned += burned.total;
    });
    const topMuscles = Object.entries(muscleGroups).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([m, c]) => `${m} (${c}بار)`).join('، ');

    // ── انرژی ──
    const energySlots = ['morning', 'evening', 'pre_workout', 'during_workout', 'post_workout'];
    const energyLabels = { morning: 'صبح', evening: 'عصر', pre_workout: 'قبل تمرین', during_workout: 'حین تمرین', post_workout: 'بعد تمرین' };
    const energyAvgs = {};
    energySlots.forEach(slot => {
      const vals = days.map(d => energyLog[d]?.[slot]).filter(v => v !== undefined && v !== null);
      if (vals.length > 0) energyAvgs[slot] = (vals.reduce((a, b) => a + (+b), 0) / vals.length).toFixed(1);
    });

    // ── عادت‌ها ──
    const habitIds = ['water', 'meditation', 'training', 'nutrition', 'sleep'];
    const habitLabels = { water: 'هدف آب', meditation: 'مدیتیشن', training: 'تمرین/دویدن', nutrition: 'تغذیه مناسب', sleep: 'خواب کافی' };
    const habitStats = {};
    habitIds.forEach(hid => {
      const done = days.filter(d => (habits[d] || {})[hid]).length;
      habitStats[hid] = { done, pct: n > 0 ? Math.round((done / n) * 100) : 0 };
    });

    // ── وزن ──
    const periodWl = wl.filter(l => days.includes(l.date));
    const allWlInPeriod = periodWl.length > 0;
    const weightStart = allWlInPeriod ? periodWl[0].weight : (wl.length > 0 ? wl[0].weight : null);
    const weightEnd = wl.length > 0 ? wl[wl.length - 1].weight : null;
    const weightChange = weightStart && weightEnd ? (weightEnd - weightStart).toFixed(1) : null;

    // ── استریک‌ها ──
    const streakSummary = STREAK_TYPES.map(s => {
      const sd = streaks[s.id] || { current: 0, best: 0 };
      return `${s.label}: فعلی=${sd.current} روز، بهترین=${sd.best} روز`;
    }).join('\n');

    // ── رکوردها ──
    const topRecords = Object.entries(exerciseRecords).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([n, w]) => `${n}: ${w}kg`).join('، ');
    const longestRun = runLog.length ? runLog.reduce((mx, e) => e.distance > mx.distance ? e : mx, runLog[0]) : null;

    // ── یادداشت‌ها ──
    const periodNotes = days.filter(d => notes[d]).map(d => `${formatJalali(d, { short: true })}: ${notes[d]}`).join('\n');

    // ── برنامه غذایی ──
    const hasMealPlan = Object.keys(mealPlan).length > 0;

    // پیش‌نمایش داده برای UI
    setDataPreview({ avgCal, avgProt, avgWater, trainDays, runDays, daysWithEntries, n });

    const periodLabel = PERIODS.find(p => p.id === period)?.label || '';
    const goalLabel = setup.goal === 'cut' ? 'کاهش وزن' : setup.goal === 'bulk' ? 'افزایش حجم' : 'حفظ وزن';

    return `تو یک مربی شخصی، متخصص تغذیه، و مربی عادت‌های سالم ایرانی هستی.
داده‌های واقعی کاربر برای دوره "${periodLabel}" (${n} روز، ${formatJalali(days[0], { short: true })} تا ${formatJalali(days[days.length - 1], { short: true })}) را تحلیل کن.

═══ مشخصات کاربر ═══
هدف: ${goalLabel}
نوع رژیم: ${setup.diet === 'balanced' ? 'متعادل' : setup.diet === 'highprot' ? 'پروتئین بالا' : setup.diet === 'lowcarb' ? 'کم‌کربوهیدرات' : setup.diet === 'keto' ? 'کتو' : setup.diet || 'متعادل'}
وزن فعلی: ${weightEnd || '?'} kg | هدف وزن: ${setup.tw || '?'} kg
قد: ${setup.h || '?'} cm | سن: ${setup.a || '?'} سال

═══ داده‌های تغذیه ═══
میانگین روزانه:
- کالری: ${avgCal} kcal (هدف: ${tg.cal || '؟'} kcal)
- پروتئین: ${avgProt}g (هدف: ${tg.prot || '؟'}g)
- کربوهیدرات: ${avgCarb}g (هدف: ${tg.carb || '؟'}g)
- چربی: ${avgFat}g (هدف: ${tg.fat || '؟'}g)

- روزهایی که آب ثبت شده: ${daysWithWater} از ${n} روز

- روزهای با پروتئین کافی (≥۸۵٪ هدف): ${protConsistency} روز
وعده‌های پرتکرار: ${Object.entries(mealTimingData).sort((a, b) => b[1] - a[1]).map(([m, c]) => `${m}(${c}بار)`).join('، ') || 'ثبت نشده'}

═══ داده‌های ورزش ═══
- روزهای تمرین قدرتی: ${trainDays} از ${n} روز (${n > 0 ? Math.round((trainDays / n) * 100) : 0}٪)
- روزهای دویدن/پیاده‌روی: ${runDays} از ${n} روز
- مجموع مسافت: ${totalRunDist.toFixed(1)} km
- مجموع زمان دویدن: ${totalRunTime} دقیقه

- گروه‌های عضلانی تمرین‌شده: ${topMuscles || 'ثبت نشده'}
- رکوردهای تمرین: ${topRecords || 'ثبت نشده'}
${longestRun ? `- طولانی‌ترین دویدن: ${longestRun.distance} km در ${longestRun.duration} دقیقه` : ''}

═══ داده‌های انرژی ═══
${Object.entries(energyAvgs).length > 0 ? Object.entries(energyAvgs).map(([k, v]) => `${energyLabels[k] || k}: ${v}/10`).join('\n') : 'داده انرژی ثبت نشده'}

═══ داده‌های عادت‌ها ═══
${habitIds.map(hid => `${habitLabels[hid]}: ${habitStats[hid].done}/${n} روز (${habitStats[hid].pct}٪)`).join('\n')}

═══ استریک‌ها ═══
${streakSummary}

═══ داده‌های وزن ═══
${weightEnd ? `وزن فعلی: ${weightEnd} kg` : 'وزن ثبت نشده'}
${weightChange !== null ? `تغییر وزن در دوره: ${Number(weightChange) > 0 ? '+' : ''}${weightChange} kg` : ''}
${periodWl.length > 1 ? `تعداد اندازه‌گیری‌های وزن در دوره: ${periodWl.length} بار` : ''}

═══ یادداشت‌های روزانه ═══
${periodNotes || 'یادداشتی ثبت نشده'}

${hasMealPlan ? 'برنامه غذایی هفتگی تنظیم شده' : 'برنامه غذایی هفتگی تنظیم نشده'}

  };

  const runCoach = async () => {
    if (!state.setup) return;
    setLoading(true); setError(false); setResult(null);
    const prompt = buildComprehensiveData();
    try {
      const text = await callGemini(prompt);
      setResult(text);
    } catch (e) {
      setError(true);
    }
    setLoading(false);
  };

  const selPeriod = PERIODS.find(p => p.id === period);

  // تجزیه نتیجه به بخش‌ها
  const parseResult = (text) => {
    if (!text) return [];
    const sections = [];
    const lines = text.split('\n');
    let cur = null;
    lines.forEach(line => {
      const hdr = line.match(/^\*\*(.+?)\*\*/);
      if (hdr) {
        if (cur) sections.push(cur);
        cur = { title: hdr[1], body: '' };
      } else if (cur) {
        cur.body += (cur.body ? '\n' : '') + line;
      }
    });
    if (cur) sections.push(cur);
    if (sections.length === 0) return [{ title: null, body: text }];
    return sections;
  };

  const SECTION_ICONS = {
    'امتیاز': '⭐',

    'تمرین': '🏋️',

    'وزن': '⚖️',
    'همبستگی': '🔗',
    'برنامه پیشنهادی': '📋',
    'پیام': '💬',
  };

              <div className="coach-meta-chip">وزن: <span>{state.weightLog?.length ? state.weightLog[state.weightLog.length - 1]?.weight + ' kg' : state.setup.w + ' kg'}</span></div>

            )}
            {result && !loading && (
              <div style={{ display: 'flex', gap: '10px' }}>
                <button className="btn-secondary" style={{ marginTop: 0 }} onClick={runCoach}>🔄 تحلیل مجدد</button>
                <button className="btn-ghost" style={{ marginTop: 0 }} onClick={() => { setResult(null); setDataPreview(null); }}>بستن</button>
              </div>

          {loading && (
            <div className="card">
              <div className="ai-loading">
                <div className="ai-spinner">✦</div>
                <div>مربی هوشمند در حال بررسی تمام داده‌های شما…</div>

          {/* نتیجه تحلیل */}
          {result && !loading && (
            <div className="coach-result">
              {parseResult(result).map((section, idx) => {
                const isActionPlan = section.title?.includes('برنامه پیشنهادی');

                    <div key={idx} className="coach-action-plan">

                return (
                  <div key={idx} className="coach-section">

        </>
      )}
    </div>
  );

// ─── کارت روند وزن ─────────────────────────────────────────────────────────────
function WeightTrendCard({ weightLog }) {
  const logs = Array.isArray(weightLog) ? [...weightLog].sort((a, b) => a.date.localeCompare(b.date)) : [];
  const current = logs.length > 0 ? logs[logs.length - 1].weight : null;

  // تغییر هفتگی
  let weeklyChange = null;
  if (logs.length >= 2) {
    const oneWeekAgo = new Date();
    oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
    const weekAgoStr = oneWeekAgo.toLocaleDateString('en-CA', { timeZone: 'Asia/Tehran' });
    const weekLog = logs.filter(l => l.date <= weekAgoStr);
    if (weekLog.length > 0) {
      weeklyChange = (current - weekLog[weekLog.length - 1].weight).toFixed(1);
    } else if (logs.length >= 2) {
      weeklyChange = (logs[logs.length - 1].weight - logs[0].weight).toFixed(1);
    }
  }

  // تغییر ماهانه
  let monthlyChange = null;
  if (logs.length >= 2) {
    const oneMonthAgo = new Date();
    oneMonthAgo.setDate(oneMonthAgo.getDate() - 30);
    const monthAgoStr = oneMonthAgo.toLocaleDateString('en-CA', { timeZone: 'Asia/Tehran' });
    const monthLog = logs.filter(l => l.date <= monthAgoStr);
    if (monthLog.length > 0) {
      monthlyChange = (current - monthLog[monthLog.length - 1].weight).toFixed(1);
    } else if (logs.length >= 2) {
      monthlyChange = (logs[logs.length - 1].weight - logs[0].weight).toFixed(1);
    }
  }

  const renderVal = (val, label, suffix) => {
    if (val === null) return (
      <div className="weight-trend-card">
        <div className="weight-trend-label">{label}</div>
        <div className="weight-trend-val neutral" style={{ fontSize: '14px' }}>ثبت نشده</div>
        <div className="weight-trend-sub">—</div>
      </div>
    );
    const num = parseFloat(val);
    const cls = num > 0 ? 'up' : num < 0 ? 'down' : 'neutral';
    const arrow = num > 0 ? '▲' : num < 0 ? '▼' : '●';
    return (
      <div className="weight-trend-card">
        <div className="weight-trend-label">{label}</div>
        <div className={`weight-trend-val ${cls}`}>{num > 0 ? '+' : ''}{val} kg</div>
        <div className="weight-trend-sub">{arrow} {suffix}</div>
      </div>
    );
  };

  return (
    <div className="card" style={{ marginBottom: '16px' }}>
      <div className="card-title">📊 روند وزن</div>
      <div className="weight-trend-grid">
        <div className="weight-trend-card">
          <div className="weight-trend-label">وزن فعلی</div>
          <div className="weight-trend-val neutral">{current !== null ? current + ' kg' : '—'}</div>
          <div className="weight-trend-sub">{logs.length > 0 ? formatJalali(logs[logs.length - 1].date, { short: true }) : 'ثبت نشده'}</div>
        </div>
        {renderVal(weeklyChange, 'تغییر هفتگی', '۷ روز اخیر')}
        {renderVal(monthlyChange, 'تغییر ماهانه', '۳۰ روز اخیر')}
      </div>
      {logs.length === 0 && (
        <div style={{ textAlign: 'center', color: 'var(--text-muted)', fontSize: '13px', padding: '8px 0' }}>برای مشاهده روند، وزن خود را در بخش تغذیه ثبت کنید</div>
      )}
    </div>
  );
}

// ─── کامپوننت اصلی ─────────────────────────────────────────────────────────────
function NutriLux() {
  const EMPTY = { setup: null, targets: null, startDate: null, entries: {}, weightLog: [] };
  const [state, setState] = useState(EMPTY);
  const [storageReady, setStorageReady] = useState(false);
  const [page, setPage] = useState('dashboard');
  const [toast, setToast] = useState(null);
  const [geminiKeyReady, setGeminiKeyReady] = useState(!!getGeminiKey());
  const [suggestions, setSuggestions] = useState(null);
  const [suggestLoading, setSuggestLoading] = useState(false);
  const [suggestError, setSuggestError] = useState(false);
  const toastTimer = useRef(null);
  const [setupForm, setSetupForm] = useState({ w: '', h: '', a: '', g: 'male', af: '3', goal: 'cut', tw: '', diet: 'balanced', duration: '6' });
  const [showResetModal, setShowResetModal] = useState(false);

  // داده‌های جدید
  const [waterLog, setWaterLog] = useState({});
  const [trainingLog, setTrainingLog] = useState([]);
  const [runLog, setRunLog] = useState([]);
  const [exerciseMemory, setExerciseMemory] = useState([]);
  const [exerciseRecords, setExerciseRecords] = useState({});
  const [habits, setHabits] = useState({});
  const [streaks, setStreaks] = useState({});
  const [notes, setNotes] = useState({});
  const [mealPlan, setMealPlan] = useState({});
  const [energyLog, setEnergyLog] = useState({});

  const { timeStr, dateKey } = useIranClock();

  // ─── بارگذاری از storage (دائمی - حتی بعد از بستن کلاود) ───
  // storage.get بدون پارامتر shared از storage شخصی کاربر می‌خواند
  // هر کاربر فقط به داده‌های خودش دسترسی دارد (جداسازی کامل)
  useEffect(() => {
    let mounted = true;
    const loadData = async () => {
      // بارگذاری با retry برای اطمینان از دریافت داده
      const tryGet = async (key, retries = 3) => {
        for (let i = 0; i < retries; i++) {
          try {
            const res = await window.storage.get(key);
            if (res?.value) return JSON.parse(res.value);
          } catch (e) {
            if (i < retries - 1) await new Promise(r => setTimeout(r, 200));
          }
        }
        return null;
      };

      const [main, extra] = await Promise.all([
        tryGet('nutrilux5'),
        tryGet('nutrilux_extra')
      ]);

      if (!mounted) return;

      if (main) setState(main);
      if (extra) {
        if (extra.waterLog) setWaterLog(extra.waterLog);
        if (extra.trainingLog) setTrainingLog(extra.trainingLog);
        if (extra.runLog) setRunLog(extra.runLog);
        if (extra.exerciseMemory) setExerciseMemory(extra.exerciseMemory);
        if (extra.exerciseRecords) setExerciseRecords(extra.exerciseRecords);
        if (extra.habits) setHabits(extra.habits);
        if (extra.streaks) setStreaks(extra.streaks);
        if (extra.notes) setNotes(extra.notes);
        if (extra.mealPlan) setMealPlan(extra.mealPlan);
        if (extra.energyLog) setEnergyLog(extra.energyLog);
      }
      setStorageReady(true);
    };

    loadData();
    return () => { mounted = false; };
  }, []);

  // ذخیره قابل اعتماد با retry
  const persistSave = useCallback(async (key, data) => {
    const str = JSON.stringify(data);
    for (let i = 0; i < 3; i++) {
      try {
        await window.storage.set(key, str);
        return true;
      } catch (e) {
        if (i < 2) await new Promise(r => setTimeout(r, 150));
      }
    }
    return false;
  }, []);

  const save = useCallback((newState) => {
    setState(newState);
    persistSave('nutrilux5', newState);
  }, [persistSave]);

  const saveExtra = useCallback((extra) => {
    persistSave('nutrilux_extra', extra);
  }, [persistSave]);

  const showToast = useCallback((msg) => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2800);
  }, []);

  // ── راه‌اندازی ──
  function calculateAndStart() {
    const { w, h, a, g, af, goal, tw, diet, duration } = setupForm;
    if (!w || !h || !a || !tw) { showToast('لطفاً همه فیلدها را پر کنید'); return; }
    const weight_kg = Number(w), height_cm = Number(h), age_years = Number(a), duration_months = Number(duration);
    const target_weight_change = goal === 'maintain' ? 0 : Number(tw) - weight_kg;
    const result = calculateMacros({ weight_kg, height_cm, age_years, gender: g, activity_days: Number(af), target_weight_change, duration_months, diet_type: diet });
    const targets = { cal: result.target_calories, prot: result.protein_grams, carb: result.carb_grams, fat: result.fat_grams, bmr: result.bmr, tdee: result.tdee, water: result.water_ml, warning: result.warning_triggered ? result.warning_message : null };
    save({ setup: { ...setupForm, w: weight_kg, h: height_cm, a: age_years, af: Number(af), tw: Number(tw), duration: duration_months }, targets, startDate: todayKey(), entries: {}, weightLog: [] });
    if (result.warning_triggered) showToast('⚠️ ' + result.warning_message);
    else showToast('برنامه شما آماده است ✦');
  }

  // ── تغذیه ──
  function addEntry(name, cal, prot, carb, fat, meal, type) {
    if (!+cal && !+prot && !+carb && !+fat) { showToast('حداقل یک مقدار وارد کنید'); return false; }
    const key = todayKey();
    const newEntries = { ...state.entries, [key]: [...(state.entries[key] || []), { name, cal: +cal || 0, prot: +prot || 0, carb: +carb || 0, fat: +fat || 0, meal, type }] };
    save({ ...state, entries: newEntries });
    showToast('«' + name + '» ثبت شد ✦');
    return true;
  }
  function deleteEntry(i) {
    const key = todayKey();
    const arr = [...(state.entries[key] || [])]; arr.splice(i, 1);
    save({ ...state, entries: { ...state.entries, [key]: arr } });
    showToast('وعده حذف شد');
  }
  function logWeight(v) {
    if (!v) { showToast('وزن را وارد کنید'); return; }
    const key = todayKey();
    const wl = state.weightLog.filter(e => e.date !== key);
    wl.push({ date: key, weight: +v }); wl.sort((a, b) => a.date.localeCompare(b.date));
    save({ ...state, weightLog: wl });
    showToast('وزن ' + v + ' kg ثبت شد ✦');
  }
  function deleteWeight(date) {
    save({ ...state, weightLog: state.weightLog.filter(e => e.date !== date) });
    showToast('ثبت وزن حذف شد');
  }

  // ── آب ──
  function addWater(ml, dk) {
    const newWL = { ...waterLog, [dk]: [...(waterLog[dk] || []), { ml, label: 'آب', ts: Date.now() }] };
    setWaterLog(newWL);
    saveExtra({ waterLog: newWL, trainingLog, runLog, exerciseMemory, exerciseRecords, habits, streaks, notes, mealPlan, energyLog });
  }
  function deleteWater(dk, idx) {
    const arr = [...(waterLog[dk] || [])]; arr.splice(idx, 1);
    const newWL = { ...waterLog, [dk]: arr };
    setWaterLog(newWL);
    saveExtra({ waterLog: newWL, trainingLog, runLog, exerciseMemory, exerciseRecords, habits, streaks, notes, mealPlan, energyLog });
  }

  // ── تمرین ──
  function saveExercise(ex) {
    const newTL = [...trainingLog, ex];
    const newMem = exerciseMemory.includes(ex.name) ? exerciseMemory : [ex.name, ...exerciseMemory].slice(0, 100);
    const newRec = { ...exerciseRecords };
    if (ex.weight && (!newRec[ex.name] || ex.weight > newRec[ex.name])) {
      newRec[ex.name] = ex.weight;
      showToast(`🏆 رکورد جدید! ${ex.name}: ${ex.weight}kg`);
    } else {
      showToast('تمرین ثبت شد ✦');
    }
    setTrainingLog(newTL); setExerciseMemory(newMem); setExerciseRecords(newRec);
    saveExtra({ waterLog, trainingLog: newTL, runLog, exerciseMemory: newMem, exerciseRecords: newRec, habits, streaks, notes, mealPlan, energyLog });
  }
  function saveRun(run) {
    const newRL = [...runLog, run];
    setRunLog(newRL);
    saveExtra({ waterLog, trainingLog, runLog: newRL, exerciseMemory, exerciseRecords, habits, streaks, notes, mealPlan, energyLog });
    showToast('جلسه ثبت شد ✦');
  }
  function deleteExercise(i) {
    const today = todayKey();
    const todayOnes = trainingLog.filter(e => e.date === today);
    const toRemove = todayOnes[i];
    const newTL = trainingLog.filter(e => e !== toRemove);
    setTrainingLog(newTL);
    saveExtra({ waterLog, trainingLog: newTL, runLog, exerciseMemory, exerciseRecords, habits, streaks, notes, mealPlan, energyLog });
  }
  function deleteRun(i) {
    const today = todayKey();
    const todayOnes = runLog.filter(e => e.date === today);
    const toRemove = todayOnes[i];
    const newRL = runLog.filter(e => e !== toRemove);
    setRunLog(newRL);
    saveExtra({ waterLog, trainingLog, runLog: newRL, exerciseMemory, exerciseRecords, habits, streaks, notes, mealPlan, energyLog });
  }

  // ── عادت‌ها ──
  function toggleHabit(periodKey, habitId) {
    const newH = { ...habits, [periodKey]: { ...(habits[periodKey] || {}), [habitId]: !(habits[periodKey] || {})[habitId] } };
    setHabits(newH);
    saveExtra({ waterLog, trainingLog, runLog, exerciseMemory, exerciseRecords, habits: newH, streaks, notes, mealPlan, energyLog });
  }
  function streakAction(id, action) {
    const cur = streaks[id] || { current: 0, best: 0 };
    let newCur, newBest;
    if (action === 'ok') { newCur = cur.current + 1; newBest = Math.max(cur.best, newCur); showToast(`🔥 استریک ${STREAK_TYPES.find(s => s.id === id)?.label}: ${newCur} روز`); }
    else { newCur = 0; newBest = cur.best; showToast('استریک ریست شد'); }
    const newS = { ...streaks, [id]: { current: newCur, best: newBest } };
    setStreaks(newS);
    saveExtra({ waterLog, trainingLog, runLog, exerciseMemory, exerciseRecords, habits, streaks: newS, notes, mealPlan, energyLog });
  }

  // ── یادداشت ──
  function saveNote(dk, text) {
    const newN = { ...notes, [dk]: text };
    setNotes(newN);
    saveExtra({ waterLog, trainingLog, runLog, exerciseMemory, exerciseRecords, habits, streaks, notes: newN, mealPlan, energyLog });
    showToast('یادداشت ذخیره شد ✦');
  }

  // ── برنامه غذایی هفتگی ──
  function saveMealPlanData(newPlan) {
    setMealPlan(newPlan);
    saveExtra({ waterLog, trainingLog, runLog, exerciseMemory, exerciseRecords, habits, streaks, notes, mealPlan: newPlan, energyLog });
  }

  // ── رهگیر انرژی ──
  function saveEnergyDay(dateKey_, dayData) {
    const newEL = { ...energyLog, [dateKey_]: dayData };
    setEnergyLog(newEL);
    saveExtra({ waterLog, trainingLog, runLog, exerciseMemory, exerciseRecords, habits, streaks, notes, mealPlan, energyLog: newEL });
  }
  function deleteEnergyDay(dateKey_) {
    const newEL = { ...energyLog };
    delete newEL[dateKey_];
    setEnergyLog(newEL);
    saveExtra({ waterLog, trainingLog, runLog, exerciseMemory, exerciseRecords, habits, streaks, notes, mealPlan, energyLog: newEL });
  }

  // ── بازنشانی کامل ──
  async function handleFullReset() {
    try {
      await window.storage.delete('nutrilux5');
      await window.storage.delete('nutrilux_extra');
    } catch (e) { }
    setState(EMPTY);
    setWaterLog({});
    setTrainingLog([]);
    setRunLog([]);
    setExerciseMemory([]);
    setExerciseRecords({});
    setHabits({});
    setStreaks({});
    setNotes({});
    setMealPlan({});
    setEnergyLog({});
    setShowResetModal(false);
    showToast('✓ بازنشانی کامل انجام شد');
  }

  // ── بازنشانی انتخابی ──
  async function handlePartialReset(selected) {
    let newState = { ...state };
    let newWaterLog = { ...waterLog };
    let newTrainingLog = [...trainingLog];
    let newRunLog = [...runLog];
    let newExerciseMemory = [...exerciseMemory];
    let newExerciseRecords = { ...exerciseRecords };
    let newHabits = { ...habits };
    let newStreaks = { ...streaks };
    let newNotes = { ...notes };
    let newMealPlan = { ...mealPlan };
    let newEnergyLog = { ...energyLog };

    if (selected.nutrition) {
      newState = { ...newState, entries: {}, weightLog: newState.weightLog };
    }
    if (selected.weightHistory) {
      newState = { ...newState, weightLog: [] };
    }
    if (selected.plans) {
      newMealPlan = {};
    }
    if (selected.notes) {
      newNotes = {};
    }
    if (selected.habits) {
      newHabits = {};
      newStreaks = {};
    }
    if (selected.training) {
      newTrainingLog = [];
      newRunLog = [];
      newExerciseMemory = [];
      newExerciseRecords = {};
    }

    setState(newState);
    setWaterLog(newWaterLog);
    setTrainingLog(newTrainingLog);
    setRunLog(newRunLog);
    setExerciseMemory(newExerciseMemory);
    setExerciseRecords(newExerciseRecords);
    setHabits(newHabits);
    setStreaks(newStreaks);
    setNotes(newNotes);
    setMealPlan(newMealPlan);
    setEnergyLog(newEnergyLog);

    persistSave('nutrilux5', newState);
    persistSave('nutrilux_extra', { waterLog: newWaterLog, trainingLog: newTrainingLog, runLog: newRunLog, exerciseMemory: newExerciseMemory, exerciseRecords: newExerciseRecords, habits: newHabits, streaks: newStreaks, notes: newNotes, mealPlan: newMealPlan, energyLog: newEnergyLog });
    setShowResetModal(false);
    showToast('✓ بازنشانی انتخابی انجام شد');
  }

  // ── پیشنهاد هوش مصنوعی ──
  async function loadSuggestions(meal, type, customPrompt = '') {
    if (!state.targets) return;
    const t = calcTotals(state.entries[todayKey()] || []);
    const tg = state.targets;
    const remCal = Math.max(tg.cal - t.cal, 0), remProt = Math.max(tg.prot - t.prot, 0);
    const remCarb = Math.max(tg.carb - t.carb, 0), remFat = Math.max(tg.fat - t.fat, 0);
    const { goal, diet } = state.setup;
    const goalL = { cut: 'کاهش وزن', bulk: 'افزایش حجم', maintain: 'حفظ وزن' };
    const dietL = { balanced: 'متعادل', highprot: 'پروتئین بالا', lowcarb: 'کم‌کربوهیدرات', keto: 'کتو' };
    const mealLabel = MEAL_OPTIONS.find(m => m.id === meal)?.label || meal;
    const typeLabel = TYPE_OPTIONS.find(tp => tp.id === type)?.label || type;
    const isdrink = type === 'drink';
    const customLine = customPrompt ? `\nفیلتر سفارشی کاربر: ${customPrompt}\nاین فیلتر را حتماً رعایت کن.` : '';
    const prompt = 'تو یک متخصص تغذیه هستی. بر اساس اطلاعات زیر، ۱۰ پیشنهاد ' + typeLabel + ' مناسب برای وعده ' + mealLabel + ' بده:\nهدف: ' + goalL[goal] + '\nنوع رژیم: ' + dietL[diet] + '\nباقی‌مانده کالری امروز: ' + remCal + ' kcal\nباقی‌مانده پروتئین: ' + remProt + ' گرم\nباقی‌مانده کربوهیدرات: ' + remCarb + ' گرم\nباقی‌مانده چربی: ' + remFat + ' گرم\nنوع درخواست: ' + typeLabel + customLine + '\nقوانین:\n- غذاهای ایرانی و در دسترس پیشنهاد بده\n- مواد اولیه دقیق با مقدار وزن/حجم هر ماده بنویس\n- زمان تقریبی آماده‌سازی بنویس\n- تنوع در پیشنهادها داشته باش\n' + (isdrink ? '- برای هر نوشیدنی، میزان آب موجود در آن را به ml تخمین بزن و در فیلد waterMl بگذار\n' : '') + 'پاسخ را فقط به صورت JSON آرایه بده، بدون هیچ توضیح و بدون backtick:\n[{"name":"نام","amount":"مقدار","cookTime":"زمان","cal":0,"prot":0,"carb":0,"fat":0' + (isdrink ? ',"waterMl":0' : '') + ',"ingredients":[{"name":"ماده","amount":"مقدار"}],"desc":"دلیل"}]';
    setSuggestLoading(true); setSuggestError(false); setSuggestions(null);
    try {
      const text = await callGemini(prompt);
      let items;
      const clean = text.replace(/```json|```/g, '').trim();
      try { items = JSON.parse(clean); }
      catch { const m = text.match(/\[[\s\S]*\]/); if (m) items = JSON.parse(m[0]); else throw new Error('parse fail'); }
      items = items.map(item => ({ ...item, _meal: meal, _type: type }));
      setSuggestions({ items, meal, type, remCal, customPrompt });
    } catch (err) { setSuggestError(true); }
    setSuggestLoading(false);
  }

  function addFromSuggestion(item) {
    const name = item.name + (item.amount ? ' (' + item.amount + ')' : '');
    const key = todayKey();
    const newEntries = { ...state.entries, [key]: [...(state.entries[key] || []), { name, cal: item.cal, prot: item.prot, carb: item.carb, fat: item.fat, meal: item._meal, type: item._type }] };
    save({ ...state, entries: newEntries });
    // اگر نوشیدنی و دارای مقدار آب است
    if (item._type === 'drink' && item.waterMl > 0) {
      const newWL = { ...waterLog, [key]: [...(waterLog[key] || []), { ml: item.waterMl, label: item.name, ts: Date.now() }] };
      setWaterLog(newWL);
      saveExtra({ waterLog: newWL, trainingLog, runLog, exerciseMemory, exerciseRecords, habits, streaks, notes, mealPlan, energyLog });
    }
    showToast('«' + item.name + '» به وعده‌های امروز اضافه شد ✦');
  }

  // ── لودینگ ──
  if (!storageReady) {
    return (
      <div className="nl-root" style={{ justifyContent: 'center', alignItems: 'center' }}>
        <style>{css}</style>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontFamily: 'Playfair Display,serif', fontSize: '32px', background: 'linear-gradient(135deg,var(--gold-light),var(--gold))', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: '16px' }}>NutriLux</div>
          <div className="ai-spinner">✦</div>
          <div style={{ color: 'var(--text-muted)', marginTop: '8px' }}>در حال بارگذاری…</div>
        </div>
      </div>
    );
  }

  // ── بررسی کلید API جمنای ──
  if (!geminiKeyReady) {
    return (
      <>
        <style>{css}</style>
        <APIKeySetupScreen onDone={() => setGeminiKeyReady(true)} />
      </>
    );
  }

  // ── صفحه راه‌اندازی ──
  if (!state.setup) {
    return (
      <div className="nl-root" style={{ justifyContent: 'center' }}>
        <style>{css}</style>
        <div style={{ maxWidth: '640px', width: '100%', padding: 'max(20px, env(safe-area-inset-top, 20px)) 16px 40px', position: 'relative', zIndex: 1 }}>
          <div style={{ textAlign: 'center', marginBottom: '40px' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '14px', marginBottom: '8px' }}>
              <div style={{ flex: 1, maxWidth: '60px', height: '1px', background: 'linear-gradient(to right,transparent,var(--gold))' }} />
              <h1 style={{ fontFamily: 'Playfair Display,serif', fontSize: '36px', fontWeight: 600, background: 'linear-gradient(135deg,var(--gold-light),var(--gold),#a07830)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>NutriLux</h1>
              <div style={{ flex: 1, maxWidth: '60px', height: '1px', background: 'linear-gradient(to left,transparent,var(--gold))' }} />
            </div>
            <div style={{ color: 'var(--text-muted)', fontSize: '13px', letterSpacing: '0.12em', textTransform: 'uppercase' }}>ردیاب هوشمند سلامت</div>
          </div>
          <SetupScreen setup={setupForm} setSetup={setSetupForm} onSubmit={calculateAndStart} />
        </div>
        {toast && <div className="toast-container"><div className="toast">{toast}</div></div>}
      </div>
    );
  }

  const nowIranDate = new Date().toLocaleDateString('fa-IR', { timeZone: 'Asia/Tehran', weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  const start = new Date(state.startDate + 'T12:00:00Z');
  const daysPassed = Math.floor((new Date() - start) / 86400000) + 1;
  const dur = state.setup.duration;
  const durLabels = { '1': '۱ ماه', '3': '۳ ماه', '6': '۶ ماه', '12': '۱۲ ماه' };

  return (
    <div className="nl-root">
      <style>{css}</style>

      {/* ناوبری پایین موبایل */}
      <nav className="bottom-nav">
        {NAV_ITEMS.map(item => (
          <button key={item.id} className={"bottom-nav-item" + (page === item.id ? ' active' : '')}
            onClick={() => setPage(item.id)}>
            <span className="bnav-icon">{item.icon}</span>
            <span className="bnav-label">{item.label}</span>
          </button>
        ))}
      </nav>

      {/* ناوبری راست دسکتاپ */}
      <nav className="side-nav">
        <div className="nav-logo">
          <h1>NutriLux</h1>
          <div className="nav-sub">ردیاب هوشمند سلامت</div>
        </div>
        <div className="nav-items">
          {NAV_ITEMS.map(item => (
            <div key={item.id} className={"nav-item" + (page === item.id ? ' active' : '')}
              onClick={() => setPage(item.id)}>
              <span className="nav-icon">{item.icon}</span>
              <span>{item.label}</span>
            </div>
          ))}
        </div>
        <div className="nav-clock">
          <div className="nav-clock-inner">
            <span>🕐</span>
            <div>
              <div className="clock-time">{timeStr}</div>
              <div className="clock-date">{nowIranDate}</div>
            </div>
          </div>
        </div>
        <div style={{ padding: '8px 20px 0' }}>
          <div style={{ fontSize: '11px', color: 'var(--text-muted)', textAlign: 'center' }}>روز {daysPassed} · برنامه {durLabels[String(dur)] || dur + ' ماهه'}</div>
        </div>
        <div className="nav-reset">
          <button className="nav-reset-btn" onClick={() => setShowResetModal(true)}>⚙ بازنشانی</button>
          <button className="nav-reset-btn" style={{marginTop:'8px',borderColor:'rgba(201,168,76,0.2)',color:'rgba(201,168,76,0.6)'}}
            onClick={() => { clearGeminiKey(); setGeminiKeyReady(false); }}>🔑 تغییر کلید API</button>
        </div>
      </nav>

      {/* مودال بازنشانی */}
      {showResetModal && (
        <ResetModal
          onClose={() => setShowResetModal(false)}
          onFullReset={handleFullReset}
          onPartialReset={handlePartialReset}
        />
      )}

      {/* محتوای اصلی */}
      <main className="main-content">
        {/* هدر موبایل */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'4px'}}
          className="mob-header">
          <div style={{fontFamily:'Playfair Display,serif',fontSize:'20px',fontWeight:600,
            background:'linear-gradient(135deg,var(--gold-light),var(--gold))',
            WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>NutriLux</div>
          <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
            <div style={{background:'var(--gold-dim)',border:'1px solid rgba(201,168,76,0.2)',borderRadius:'99px',padding:'5px 12px'}}>
              <span style={{fontFamily:'Playfair Display,serif',fontSize:'14px',color:'var(--gold-light)',fontWeight:600}}>{timeStr}</span>
            </div>
            <button style={{background:'var(--surface)',border:'1px solid rgba(232,115,90,0.25)',borderRadius:'99px',color:'rgba(232,115,90,0.7)',fontSize:'11px',padding:'5px 10px',cursor:'pointer',fontFamily:'Vazirmatn,sans-serif'}} onClick={() => setShowResetModal(true)}>⚙</button>
          </div>
        </div>
        {state.targets?.warning && page === 'nutrition' && (<div className="warning-banner">⚠️ {state.targets.warning}</div>)}

        {page === 'mealplan' && (
          <WeeklyMealPlanPage targets={state.targets} mealPlan={mealPlan} onSaveMealPlan={saveMealPlanData} showToast={showToast} />
        )}
        {page === 'dashboard' && (
          <>
            <WeightTrendCard weightLog={state.weightLog} />
            <DashboardPage state={state} dateKey={dateKey} timeStr={timeStr} waterLog={waterLog}
              trainingLog={trainingLog} runLog={runLog} streaks={streaks} habits={habits} setPage={setPage} />
          </>
        )}
        {page === 'nutrition' && (
          <NutritionPage state={state} dateKey={dateKey}
            onAdd={addEntry} onDelete={deleteEntry} onLogWeight={logWeight} onDeleteWeight={deleteWeight}
            loadSuggestions={loadSuggestions} suggestLoading={suggestLoading} suggestError={suggestError}
            suggestions={suggestions} addFromSuggestion={addFromSuggestion}
            waterLog={waterLog} onAddWater={addWater} onDeleteWater={deleteWater} />
        )}
        {page === 'training' && (
          <TrainingPage trainingLog={trainingLog} runLog={runLog} exerciseMemory={exerciseMemory}
            exerciseRecords={exerciseRecords} onSaveExercise={saveExercise} onSaveRun={saveRun}
            onDeleteExercise={deleteExercise} onDeleteRun={deleteRun} />
        )}
        {page === 'energy' && (
          <EnergyTrackerPage energyLog={energyLog} onSaveEnergy={saveEnergyDay} onDeleteEnergy={deleteEnergyDay} />
        )}
        {page === 'habits' && (
          <HabitsPage habits={habits} streaks={streaks} dateKey={dateKey}
            onToggleHabit={toggleHabit} onStreakAction={streakAction} />
        )}
        {page === 'archive' && (
          <ArchivePage state={state} waterLog={waterLog} trainingLog={trainingLog} runLog={runLog}
            habits={habits} notes={notes} onSaveNote={saveNote} />
        )}
        {page === 'records' && (
          <RecordsPage exerciseRecords={exerciseRecords} runLog={runLog} streaks={streaks} />
        )}
        {page === 'coach' && (
          <AICoachPage
            state={state} waterLog={waterLog} trainingLog={trainingLog} runLog={runLog}
            energyLog={energyLog} habits={habits} notes={notes} streaks={streaks}
            exerciseRecords={exerciseRecords} mealPlan={mealPlan}
          />
        )}
      </main>

      {toast && <div className="toast-container"><div className="toast">{toast}</div></div>}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(NutriLux));
  </script>
</body>
</html>
