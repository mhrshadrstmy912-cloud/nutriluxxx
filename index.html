// ─── تبدیل تاریخ به شمسی (Jalali) ───────────────────────────────────────────
function toJalali(gy, gm, gd) {
  const g_d_no = [31,28,31,30,31,30,31,31,30,31,30,31];
  const j_d_no = [31,31,31,31,31,31,30,30,30,30,30,29];
  if (gy > 1600) { var jy = 979; gy -= 1600; } else { var jy = 0; gy -= 621; }
  var gy2 = (gm > 2) ? (gy + 1) : gy;
  var days = (365 * gy) + (Math.floor((gy2 + 3) / 4)) - (Math.floor((gy2 + 99) / 100)) + (Math.floor((gy2 + 399) / 400)) - 80 + gd;
  for (var i = 0; i < gm - 1; i++) days += g_d_no[i];
  jy += 33 * (Math.floor(days / 12053)); days %= 12053;
  jy += 4 * (Math.floor(days / 1461)); days %= 1461;
  if (days > 365) { jy += Math.floor((days - 1) / 365); days = (days - 1) % 365; }
  var jm = (days < 186) ? 1 + Math.floor(days / 31) : 7 + Math.floor((days - 186) / 30);
  var jd = 1 + ((days < 186) ? (days % 31) : ((days - 186) % 30));
  return [jy, jm, jd];
}

function gregorianToJalali(dateStr) {
  const d = new Date(dateStr + 'T12:00:00Z');
  return toJalali(d.getUTCFullYear(), d.getUTCMonth() + 1, d.getUTCDate());
}

const J_MONTH_NAMES = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
const J_WEEKDAY_NAMES = ['شنبه','یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنجشنبه','جمعه'];

function formatJalali(dateStr, opts = {}) {
  if (!dateStr) return '';
  try {
    const [jy, jm, jd] = gregorianToJalali(dateStr);
    const d = new Date(dateStr + 'T12:00:00Z');
    const wday = J_WEEKDAY_NAMES[(d.getUTCDay() + 1) % 7];
    if (opts.short) return `${jd} ${J_MONTH_NAMES[jm-1]}`;
    if (opts.full) return `${wday} ${jd} ${J_MONTH_NAMES[jm-1]} ${jy}`;
    return `${jd} ${J_MONTH_NAMES[jm-1]} ${jy}`;
  } catch(e) { return dateStr; }
}

function toFarsiNum(n) {
  return String(n).replace(/\d/g, d => '۰۱۲۳۴۵۶۷۸۹'[d]);
}

// ─── CSS ─────────────────────────────────────────────────────────────────────
const css = `
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Vazirmatn:wght@300;400;500;600&display=swap');
:root {
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:rgba(255,255,255,0.06);
  --gold:#c9a84c;--gold-light:#e8c97a;--gold-dim:rgba(201,168,76,0.15);
  --text:#f0ede8;--text-muted:rgba(240,237,232,0.45);
  --cal:#e8735a;--prot:#5ab4e8;--carb:#7de87a;--fat:#e8b85a;
  --cal-dim:rgba(232,115,90,0.12);--prot-dim:rgba(90,180,232,0.12);
  --carb-dim:rgba(125,232,122,0.12);--fat-dim:rgba(232,184,90,0.12);
  --water:#38bdf8;--water-dim:rgba(56,189,248,0.12);
  --radius:16px;--radius-sm:10px;
  --nav-w:220px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);}
.nl-root{background:var(--bg);color:var(--text);font-family:'Vazirmatn',sans-serif;font-weight:400;min-height:100vh;overflow-x:hidden;direction:rtl;display:flex;}
.nl-root::before{content:'';position:fixed;top:-30vh;left:50%;transform:translateX(-50%);width:80vw;height:80vh;background:radial-gradient(ellipse,rgba(201,168,76,0.04) 0%,transparent 70%);pointer-events:none;z-index:0;}

/* ─── ناوبری راست ─── */
.side-nav{position:fixed;top:0;right:0;width:var(--nav-w);height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:100;display:flex;flex-direction:column;padding:32px 0 24px;transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);}
.nav-logo{text-align:center;padding:0 20px 28px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.nav-logo h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;background:linear-gradient(135deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-logo .nav-sub{font-size:10px;color:var(--text-muted);letter-spacing:0.12em;text-transform:uppercase;margin-top:4px;}
.nav-items{flex:1;overflow-y:auto;padding:0 12px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-muted);font-size:14px;font-family:'Vazirmatn',sans-serif;transition:all 0.2s;margin-bottom:4px;border:1px solid transparent;position:relative;}
.nav-item:hover{color:var(--gold);background:var(--gold-dim);border-color:rgba(201,168,76,0.15);}
.nav-item.active{color:var(--gold-light);background:var(--gold-dim);border-color:rgba(201,168,76,0.25);box-shadow:0 2px 12px rgba(201,168,76,0.1);}
.nav-item.active::before{content:'';position:absolute;right:-12px;top:50%;transform:translateY(-50%);width:3px;height:24px;background:var(--gold);border-radius:0 3px 3px 0;}
.nav-icon{font-size:18px;flex-shrink:0;}
.nav-clock{padding:16px 20px 0;border-top:1px solid var(--border);margin-top:auto;}
.nav-clock-inner{display:flex;align-items:center;gap:8px;background:var(--gold-dim);border:1px solid rgba(201,168,76,0.2);border-radius:var(--radius-sm);padding:8px 14px;}
.clock-time{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold-light);font-weight:600;}
.clock-date{font-size:10px;color:var(--text-muted);margin-top:2px;line-height:1.4;}
.nav-reset{padding:12px 20px 0;}
.nav-reset-btn{background:none;border:1px solid rgba(232,115,90,0.2);border-radius:var(--radius-sm);color:rgba(232,115,90,0.6);font-family:'Vazirmatn',sans-serif;font-size:11px;padding:8px;cursor:pointer;width:100%;transition:all 0.2s;}
.nav-reset-btn:hover{border-color:var(--cal);color:var(--cal);background:var(--cal-dim);}

/* ─── محتوای اصلی ─── */
.main-content{margin-right:var(--nav-w);flex:1;padding:40px 32px 80px;max-width:calc(100% - var(--nav-w));min-height:100vh;position:relative;z-index:1;}
.mob-header{display:none;}
.page-header{margin-bottom:36px;}
.page-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;color:var(--gold-light);margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text-muted);}

/* همبرگر موبایل */
/* ─── ناوبری پایین موبایل ─── */
.mob-toggle{display:none;}
.bottom-nav{display:none;}
@media(max-width:768px){
  .mob-toggle{display:none;}
  .side-nav{display:none!important;}
  .nav-overlay{display:none!important;}
  .main-content{margin-right:0!important;padding:16px 12px calc(90px + var(--safe-bottom))!important;max-width:100%!important;}

/* ─── کارت ─── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;transition:border-color 0.3s;}
.card:hover{border-color:rgba(201,168,76,0.1);}
.card-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:500;color:var(--gold-light);margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.card-title::after{content:'';flex:1;height:1px;background:linear-gradient(to left,transparent,rgba(201,168,76,0.2));}

/* ─── فرم‌ها ─── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:560px){.form-grid{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:8px;position:relative;}
label.lbl{font-size:12px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Vazirmatn',sans-serif;font-size:15px;padding:12px 16px;outline:none;transition:border-color 0.25s,box-shadow 0.25s;width:100%;direction:ltr;text-align:right;}
textarea{direction:rtl;resize:vertical;min-height:100px;}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.1);}
select option{background:#1a1a26;}
input[type=text],input[type=search]{direction:rtl;}
.autocomplete-list{position:absolute;top:100%;right:0;left:0;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);z-index:50;max-height:200px;overflow-y:auto;margin-top:4px;}
.autocomplete-item{padding:10px 16px;cursor:pointer;font-size:14px;transition:background 0.15s;}
.autocomplete-item:hover{background:var(--gold-dim);color:var(--gold-light);}

/* ─── دکمه‌ها ─── */
.btn-primary{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:#0a0a0f;border:none;border-radius:var(--radius-sm);font-family:'Vazirmatn',sans-serif;font-size:15px;font-weight:600;padding:14px 32px;cursor:pointer;width:100%;margin-top:8px;letter-spacing:0.04em;transition:opacity 0.2s,transform 0.15s,box-shadow 0.2s;box-shadow:0 4px 20px rgba(201,168,76,0.2);}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 28px rgba(201,168,76,0.3);}
.btn-primary:active{transform:translateY(0);}
.btn-secondary{background:var(--surface2);color:var(--gold-light);border:1px solid rgba(201,168,76,0.3);border-radius:var(--radius-sm);font-family:'Vazirmatn',sans-serif;font-size:14px;font-weight:500;padding:11px 24px;cursor:pointer;transition:background 0.2s,border-color 0.2s,transform 0.15s;width:100%;margin-top:8px;}
.btn-secondary:hover{background:var(--gold-dim);border-color:var(--gold);transform:translateY(-1px);}
.btn-ghost{background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);font-family:'Vazirmatn',sans-serif;font-size:13px;padding:8px 16px;cursor:pointer;transition:border-color 0.2s,color 0.2s;}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;font-family:'Vazirmatn',sans-serif;transition:all 0.2s;}
.btn-sm:hover{border-color:var(--gold);color:var(--gold);}
.btn-sm.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-light);}
.btn-danger{background:var(--cal-dim);border:1px solid rgba(232,115,90,0.3);color:var(--cal);border-radius:var(--radius-sm);font-family:'Vazirmatn',sans-serif;font-size:13px;padding:8px 16px;cursor:pointer;transition:all 0.2s;}
.btn-danger:hover{background:rgba(232,115,90,0.25);}

/* ─── حلقه ماکرو ─── */
.summary-top{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
@media(max-width:900px){.summary-top{grid-template-columns:1fr 1fr;}}
@media(max-width:480px){.summary-top{grid-template-columns:1fr 1fr;}}
.macro-ring-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:12px;transition:border-color 0.3s,transform 0.2s;}
.macro-ring-card:hover{transform:translateY(-2px);}
.macro-ring-card.cal{border-color:rgba(232,115,90,0.2);}
.macro-ring-card.prot{border-color:rgba(90,180,232,0.2);}
.macro-ring-card.carb{border-color:rgba(125,232,122,0.2);}
.macro-ring-card.fat{border-color:rgba(232,184,90,0.2);}
.ring-info{flex:1;min-width:0;}
.ring-label{font-size:10px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px;}
.ring-remaining{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;margin-bottom:2px;}
.ring-sub{font-size:10px;color:var(--text-muted);}
.progress-bar-wrap{background:var(--surface2);border-radius:99px;height:5px;overflow:hidden;margin-top:5px;}
.progress-bar-fill{height:100%;border-radius:99px;transition:width 0.7s cubic-bezier(0.34,1.2,0.64,1);}

/* ─── داشبورد ─── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px;}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:560px){.dash-grid{grid-template-columns:1fr 1fr;}}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all 0.2s;}
.dash-card:hover{transform:translateY(-2px);border-color:rgba(201,168,76,0.15);}
.dash-card-label{font-size:11px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
.dash-card-val{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;color:var(--gold-light);}
.dash-card-sub{font-size:12px;color:var(--text-muted);margin-top:4px;}
.dash-status-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:560px){.dash-status-row{grid-template-columns:1fr;}}
.status-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;transition:all 0.2s;}
.status-card.done{border-color:rgba(125,232,122,0.3);background:rgba(125,232,122,0.04);}
.status-card.fail{border-color:rgba(232,115,90,0.3);background:rgba(232,115,90,0.04);}
.status-icon{font-size:28px;margin-bottom:8px;}
.status-label{font-size:13px;font-weight:500;margin-bottom:4px;}
.status-state{font-size:11px;color:var(--text-muted);}
.status-state.done{color:var(--carb);}
.streak-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media(max-width:480px){.streak-row{grid-template-columns:1fr;}}
.streak-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.streak-name{font-size:13px;color:var(--text-muted);margin-bottom:8px;}
.streak-nums{display:flex;align-items:baseline;gap:6px;}
.streak-cur{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;color:var(--gold-light);}
.streak-unit{font-size:12px;color:var(--text-muted);}
.streak-best{font-size:12px;color:var(--text-muted);margin-top:4px;}
.streak-best span{color:var(--gold);}
.streak-btns{display:flex;gap:8px;margin-top:10px;}
.streak-btn-ok{flex:1;padding:11px 8px;border-radius:8px;border:1px solid rgba(125,232,122,0.3);background:rgba(125,232,122,0.08);color:var(--carb);font-family:'Vazirmatn',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s;min-height:44px;}
.streak-btn-ok:hover{background:rgba(125,232,122,0.15);}
.streak-btn-fail{flex:1;padding:11px 8px;border-radius:8px;border:1px solid rgba(232,115,90,0.3);background:rgba(232,115,90,0.08);color:var(--cal);font-family:'Vazirmatn',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s;min-height:44px;}
.streak-btn-fail:hover{background:rgba(232,115,90,0.15);}

/* ─── آب ─── */
.water-bar-outer{background:var(--surface2);border-radius:99px;height:14px;overflow:hidden;margin:10px 0;}
.water-bar-inner{height:100%;border-radius:99px;background:linear-gradient(to left,#38bdf8,#0ea5e9);transition:width 0.8s cubic-bezier(0.34,1.2,0.64,1);}
.water-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.water-btn{padding:12px 18px;border-radius:99px;border:1px solid rgba(56,189,248,0.3);background:rgba(56,189,248,0.08);color:#38bdf8;font-family:'Vazirmatn',sans-serif;font-size:14px;cursor:pointer;transition:all 0.2s;min-height:44px;display:flex;align-items:center;}
.water-btn:hover{background:rgba(56,189,248,0.18);border-color:#38bdf8;}

/* ─── تاریخچه / ورودی ─── */
.entry-item{display:flex;align-items:center;padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:6px;background:var(--surface2);border:1px solid var(--border);gap:12px;transition:background 0.2s;}
.entry-item:hover{background:rgba(255,255,255,0.03);}
.entry-name{flex:1;font-size:14px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.entry-chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{font-size:11px;padding:3px 8px;border-radius:99px;font-weight:500;white-space:nowrap;}
.chip.cal{background:var(--cal-dim);color:var(--cal);}
.chip.prot{background:var(--prot-dim);color:var(--prot);}
.chip.carb{background:var(--carb-dim);color:var(--carb);}
.chip.fat{background:var(--fat-dim);color:var(--fat);}
.chip.meal{background:rgba(201,168,76,0.12);color:var(--gold-light);}
.chip.water{background:var(--water-dim);color:var(--water);}
.entry-del{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;padding:8px;border-radius:6px;transition:color 0.2s,background 0.2s;line-height:1;flex-shrink:0;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;}
.entry-del:hover{color:var(--cal);background:var(--cal-dim);}

/* ─── تمرین ─── */
.training-entry{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:8px;}
.training-entry-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.training-entry-name{font-size:15px;font-weight:500;color:var(--gold-light);}
.training-entry-muscle{font-size:12px;color:var(--text-muted);}
.training-entry-stats{display:flex;gap:8px;flex-wrap:wrap;}
.pr-badge{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:#0a0a0f;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;letter-spacing:0.05em;}

/* ─── عادت‌ها ─── */
.habit-item{display:flex;align-items:center;justify-content:space-between;padding:16px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all 0.2s;min-height:52px;-webkit-tap-highlight-color:transparent;}
.habit-item.done{border-color:rgba(125,232,122,0.3);background:rgba(125,232,122,0.04);}
.habit-item:hover{border-color:rgba(201,168,76,0.2);}
.habit-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.2s;flex-shrink:0;}
.habit-item.done .habit-check{border-color:var(--carb);background:rgba(125,232,122,0.15);}
.habit-label{font-size:14px;font-weight:500;}
.habit-item.done .habit-label{color:var(--carb);}
.habit-section-title{font-size:12px;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;margin:16px 0 10px;display:flex;align-items:center;gap:8px;}
.habit-section-title::after{content:'';flex:1;height:1px;background:rgba(201,168,76,0.15);}

/* ─── آرشیو ─── */
.archive-date-nav{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.archive-date-display{flex:1;text-align:center;font-family:'Playfair Display',serif;font-size:18px;color:var(--gold-light);}
.archive-nav-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);padding:10px 16px;cursor:pointer;font-size:18px;transition:all 0.2s;}
.archive-nav-btn:hover{border-color:var(--gold);color:var(--gold);}
.archive-section{margin-bottom:20px;}
.archive-section-header{font-size:13px;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.archive-section-header::after{content:'';flex:1;height:1px;background:rgba(201,168,76,0.1);}
.archive-note-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;font-size:14px;line-height:1.7;color:var(--text);}

/* ─── رکوردها ─── */
.record-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border);margin-bottom:8px;}
.record-name{font-size:14px;font-weight:500;}
.record-val{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold-light);}
.record-unit{font-size:12px;color:var(--text-muted);margin-top:2px;}

/* ─── متفرقه ─── */
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.date-display{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold-light);}
.day-streak{font-size:12px;color:var(--text-muted);letter-spacing:0.06em;}
.iran-clock{display:inline-flex;align-items:center;gap:7px;background:var(--gold-dim);border:1px solid rgba(201,168,76,0.25);border-radius:99px;padding:5px 14px;font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--gold-light);letter-spacing:0.05em;margin-top:6px;}
.goal-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.goal-label{font-size:13px;color:var(--text-muted);}
.goal-value{font-family:'Playfair Display',serif;font-size:14px;color:var(--gold-light);}
.goal-bar-wrap{background:var(--surface2);border-radius:99px;height:8px;overflow:hidden;margin-bottom:16px;}
.goal-bar-fill{height:100%;border-radius:99px;background:linear-gradient(to left,var(--gold-light),var(--gold));transition:width 0.7s ease;}
.tabs{display:flex;gap:4px;background:var(--surface2);border-radius:var(--radius-sm);padding:4px;margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;padding:9px 10px;border:none;background:none;cursor:pointer;color:var(--text-muted);font-family:'Vazirmatn',sans-serif;font-size:12px;border-radius:7px;transition:background 0.2s,color 0.2s;white-space:nowrap;}
.tab.active{background:var(--surface);color:var(--gold-light);box-shadow:0 2px 8px rgba(0,0,0,0.3);}
.empty-state{text-align:center;padding:32px 16px;color:var(--text-muted);font-size:13px;}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:0.4;}
.over-limit{color:var(--cal)!important;}
.divider{height:1px;background:var(--border);margin:20px 0;}
.stats-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:480px){.stats-mini{grid-template-columns:repeat(2,1fr);}}
.stat-box{background:var(--surface2);border-radius:var(--radius-sm);padding:14px;text-align:center;border:1px solid var(--border);}
.stat-box-val{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;margin-bottom:4px;}
.stat-box-lbl{font-size:11px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;}
.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;}
.toast{background:var(--surface);border:1px solid var(--gold);border-radius:99px;padding:10px 20px;font-size:13px;color:var(--gold-light);box-shadow:0 8px 32px rgba(0,0,0,0.5);white-space:nowrap;animation:toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes toastIn{from{transform:translateY(80px);opacity:0}to{transform:none;opacity:1}}
.ai-loading{text-align:center;padding:32px;color:var(--text-muted);}
.ai-spinner{display:inline-block;font-size:28px;margin-bottom:12px;animation:spin 2s linear infinite;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.weight-entry{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border);margin-bottom:6px;}
.weight-entry-date{font-size:12px;color:var(--text-muted);}
.weight-entry-val{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--gold-light);}
.weight-entry-delta{font-size:12px;padding:2px 8px;border-radius:99px;}
.delta-up{background:rgba(232,115,90,0.12);color:var(--cal);}
.delta-down{background:rgba(125,232,122,0.12);color:var(--carb);}
.delta-same{background:var(--gold-dim);color:var(--gold);}
canvas{display:block;width:100%!important;border-radius:var(--radius-sm);}
.chart-wrap{position:relative;background:var(--surface2);border-radius:var(--radius-sm);padding:16px;border:1px solid var(--border);min-height:260px;}
.chart-legend{display:flex;gap:16px;justify-content:center;margin-top:12px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);}
.legend-dot{width:10px;height:10px;border-radius:50%;}

/* ─── رهگیر انرژی ─── */
--energy:#a78bfa;--energy-dim:rgba(167,139,250,0.12);
.energy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
@media(max-width:560px){.energy-grid{grid-template-columns:repeat(2,1fr);}}
.energy-slot{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;transition:all 0.2s;}
.energy-slot.tracked{border-color:rgba(167,139,250,0.4);background:rgba(167,139,250,0.06);}
.energy-slot-label{font-size:11px;color:var(--text-muted);letter-spacing:0.06em;margin-bottom:8px;}
.energy-slot-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:#a78bfa;margin-bottom:4px;}
.energy-slider-wrap{margin-top:8px;}
.energy-slider{width:100%;-webkit-appearance:none;appearance:none;height:4px;border-radius:99px;background:var(--border);outline:none;cursor:pointer;}
.energy-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:#a78bfa;cursor:pointer;border:2px solid var(--bg);box-shadow:0 0 6px rgba(167,139,250,0.4);}
.energy-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#a78bfa;cursor:pointer;border:2px solid var(--bg);}
.energy-history-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border);margin-bottom:6px;}
.energy-date{font-size:12px;color:var(--text-muted);}
.energy-chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.energy-chip{font-size:10px;padding:2px 8px;border-radius:99px;background:rgba(167,139,250,0.12);color:#a78bfa;font-weight:500;}
.energy-avg-bar{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.energy-avg-label{font-size:12px;color:var(--text-muted);min-width:80px;}
.energy-avg-track{flex:1;height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.energy-avg-fill{height:100%;border-radius:99px;background:linear-gradient(to left,#a78bfa,#7c3aed);transition:width 0.7s ease;}

/* ─── وزن پیشرفته ─── */
.weight-type-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.weight-type-btn{padding:7px 14px;border-radius:99px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-family:'Vazirmatn',sans-serif;font-size:12px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.weight-type-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-light);}
.weight-type-btn:hover{border-color:rgba(201,168,76,0.3);color:var(--gold);}
.weight-sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}

/* ─── شاخص‌های پیشرفته تمرین ─── */
.adv-metric-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
@media(max-width:480px){.adv-metric-row{grid-template-columns:1fr;}}
.adv-metric-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;}
.adv-metric-label{font-size:11px;color:var(--text-muted);margin-bottom:6px;letter-spacing:0.06em;}
.adv-metric-val{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold-light);margin-bottom:4px;}
.adv-metric-bar{height:4px;border-radius:99px;background:var(--border);overflow:hidden;margin-top:4px;}
.adv-metric-fill{height:100%;border-radius:99px;transition:width 0.5s ease;}
.pill-group{display:flex;flex-wrap:nowrap;gap:6px;margin-bottom:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:4px 0 10px;cursor:grab;}
.pill-group::-webkit-scrollbar{display:none;}
.pill{flex:0 0 auto;padding:9px 14px;border-radius:99px;border:1px solid var(--border);background:none;color:var(--text-muted);font-family:'Vazirmatn',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s;white-space:nowrap;-webkit-tap-highlight-color:transparent;user-select:none;}
.pill:hover{border-color:rgba(201,168,76,0.4);color:var(--gold);}
.pill.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-light);}
.type-row{display:flex;gap:10px;margin-bottom:20px;}
.type-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-family:'Vazirmatn',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s;}
.type-btn:hover{border-color:rgba(201,168,76,0.3);color:var(--gold);}
.type-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-light);}
.type-icon{font-size:22px;}

/* ─── گرید انتخاب وعده (جدید - موبایل‌فرست) ─── */
.meal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px;}
@media(max-width:600px){.meal-grid{grid-template-columns:repeat(2,1fr);gap:8px;}}
.meal-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-family:'Vazirmatn',sans-serif;cursor:pointer;transition:all 0.2s;-webkit-tap-highlight-color:transparent;user-select:none;}
.meal-btn:hover{border-color:rgba(201,168,76,0.3);color:var(--gold);}
.meal-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-light);}
.meal-btn-icon{font-size:20px;line-height:1;}
.meal-btn-label{font-size:11px;text-align:center;line-height:1.3;word-break:keep-all;}
@media(max-width:380px){.meal-btn-label{font-size:10px;}.meal-btn-icon{font-size:18px;}}
.sug-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:12px;overflow:hidden;transition:border-color 0.2s;}
.sug-card:hover{border-color:rgba(201,168,76,0.25);}
.sug-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:16px;cursor:pointer;}
.sug-name{font-family:'Playfair Display',serif;font-size:15px;color:var(--gold-light);flex:1;}
.sug-chips{display:flex;gap:6px;flex-wrap:wrap;padding:0 16px 12px;}
.sug-expand-icon{font-size:12px;color:var(--text-muted);transition:transform 0.3s;flex-shrink:0;margin-top:3px;}
.sug-expand-icon.open{transform:rotate(180deg);}
.sug-detail{border-top:1px solid var(--border);padding:16px;animation:fadeIn 0.25s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.detail-section{margin-bottom:16px;}
.detail-section-title{font-size:11px;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.detail-section-title::after{content:'';flex:1;height:1px;background:rgba(201,168,76,0.15);}
.ingredient-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.ingredient-row:last-child{border-bottom:none;}
.ingredient-name{font-size:13px;color:var(--text);}
.ingredient-amount{font-size:13px;color:var(--gold-light);font-weight:500;}
.cook-time-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(90,180,232,0.1);border:1px solid rgba(90,180,232,0.2);border-radius:99px;padding:6px 14px;font-size:13px;color:#5ab4e8;}
.desc-text{font-size:13px;color:var(--text-muted);line-height:1.7;}
.add-btn-row{display:flex;gap:10px;margin-top:4px;}
.add-btn{flex:1;background:linear-gradient(135deg,var(--gold-light),var(--gold));color:#0a0a0f;border:none;border-radius:var(--radius-sm);font-family:'Vazirmatn',sans-serif;font-size:14px;font-weight:600;padding:12px;cursor:pointer;transition:opacity 0.2s,transform 0.15s;box-shadow:0 4px 16px rgba(201,168,76,0.25);}
.add-btn:hover{opacity:.9;transform:translateY(-1px);}
.dismiss-btn{background:var(--surface);color:var(--text-muted);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Vazirmatn',sans-serif;font-size:13px;padding:12px 18px;cursor:pointer;transition:border-color 0.2s,color 0.2s;}
.dismiss-btn:hover{border-color:var(--cal);color:var(--cal);}
.ai-refresh-btn{background:none;border:1px solid rgba(201,168,76,0.3);border-radius:var(--radius-sm);color:var(--gold);font-family:'Vazirmatn',sans-serif;font-size:13px;padding:8px 16px;cursor:pointer;transition:background 0.2s;}
.ai-refresh-btn:hover{background:var(--gold-dim);}
.filter-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
.warning-banner{background:rgba(232,115,90,0.08);border:1px solid rgba(232,115,90,0.3);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--cal);display:flex;align-items:flex-start;gap:8px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:600px){.two-col{grid-template-columns:1fr;}}
.page-fade{animation:pageFade 0.3s ease both;}
@keyframes pageFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ─── برنامه هفتگی ─── */
.week-nav{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:4px 0 12px;margin-bottom:4px;}
.week-nav::-webkit-scrollbar{display:none;}
.week-day-btn{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-family:'Vazirmatn',sans-serif;font-size:12px;cursor:pointer;transition:all 0.2s;min-width:70px;}
.week-day-btn:hover{border-color:rgba(201,168,76,0.3);color:var(--gold);}
.week-day-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-light);}
.week-day-btn .day-name{font-size:13px;font-weight:500;}
.week-day-btn .day-cal{font-size:10px;opacity:0.7;}
.meal-slot-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;transition:border-color 0.2s;}
.meal-slot-card:hover{border-color:rgba(201,168,76,0.15);}
.meal-slot-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.meal-slot-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:var(--gold-light);}
.meal-slot-time{font-size:12px;color:var(--text-muted);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-family:'Vazirmatn',sans-serif;cursor:pointer;}
.meal-slot-time:focus{outline:none;border-color:var(--gold);}
.meal-item-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);margin-bottom:6px;}
.meal-item-name{flex:1;font-size:13px;}
.meal-item-chips{display:flex;gap:4px;flex-wrap:wrap;}
.meal-item-del{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:14px;padding:4px 6px;border-radius:4px;transition:color 0.2s;flex-shrink:0;}
.meal-item-del:hover{color:var(--cal);}
.add-meal-item-row{display:flex;gap:8px;margin-top:8px;}
.add-meal-item-row input{flex:1;}
.meal-macro-row{display:flex;gap:8px;margin-top:6px;}
.meal-macro-row input{flex:1;font-size:13px!important;padding:8px 10px!important;}
.plan-validate-banner{border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:16px;font-size:13px;display:flex;align-items:flex-start;gap:8px;}
.plan-validate-banner.warn{background:rgba(232,184,90,0.08);border:1px solid rgba(232,184,90,0.3);color:var(--fat);}
.plan-validate-banner.ok{background:rgba(125,232,122,0.06);border:1px solid rgba(125,232,122,0.2);color:var(--carb);}
.plan-validate-banner.over{background:rgba(232,115,90,0.08);border:1px solid rgba(232,115,90,0.3);color:var(--cal);}
.week-summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
@media(max-width:480px){.week-summary-grid{grid-template-columns:1fr 1fr;}}
.week-sum-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;}
.week-sum-val{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;margin-bottom:3px;}
.week-sum-lbl{font-size:10px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;}
.ai-plan-modal{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:flex;align-items:flex-end;justify-content:center;}
@media(min-width:600px){.ai-plan-modal{align-items:center;}}
.ai-plan-sheet{background:var(--surface);border-radius:24px 24px 0 0;padding:28px 24px 40px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;}
@media(min-width:600px){.ai-plan-sheet{border-radius:var(--radius);}}
.ai-plan-sheet-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold-light);margin-bottom:20px;text-align:center;}
.ai-params-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
@media(max-width:480px){.ai-params-grid{grid-template-columns:1fr;}}

/* ─── محاسبه خودکار غذا ─── */
.smart-result-box{background:var(--surface2);border:1px solid rgba(201,168,76,0.25);border-radius:var(--radius-sm);padding:16px;margin:14px 0;animation:fadeIn 0.3s ease both;}

// ─── شناسه کاربر (جداسازی داده‌ها بین کاربران مختلف) ──────────────────────────
function getUserId() {
  // شناسه کاربر از storage شخصی دریافت می‌شود (shared=false = فقط برای این کاربر)

  return '__nutrilux_uid__'; // کلید ثابت برای دریافت UID

// ─── مدیریت API Key جمنای ────────────────────────────────────────────────────
function getGeminiKey() {
  return localStorage.getItem('nutrilux_gemini_key') || '';
}
function saveGeminiKey(key) {
  localStorage.setItem('nutrilux_gemini_key', key.trim());
}
function clearGeminiKey() {
  localStorage.removeItem('nutrilux_gemini_key');
}

// ─── تابع مرکزی فراخوانی Gemini ──────────────────────────────────────────────
async function callGemini(prompt) {
  const apiKey = getGeminiKey();
  if (!apiKey) throw new Error('NO_KEY');
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 8192 }
      })
    }
  );
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    if (res.status === 400 || res.status === 403) throw new Error('BAD_KEY');
    throw new Error('API_ERROR');
  }
  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
  return text;
}

// ─── ابزارهای کمکی ────────────────────────────────────────────────────────
function todayKey() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Tehran' });
}

function useIranClock() {
  const [, setTick] = useState(0);
  const prevKey = useRef(todayKey());
  useEffect(() => {
    const id = setInterval(() => {
      const newKey = todayKey();
      if (newKey !== prevKey.current) { prevKey.current = newKey; }
      setTick(t => t + 1);
    }, 1000);
    return () => clearInterval(id);
  }, []);
  const timeStr = new Date().toLocaleTimeString('fa-IR', { timeZone: 'Asia/Tehran', hour: '2-digit', minute: '2-digit', hour12: false });
  const dateKey = todayKey();
  return { timeStr, dateKey };
}

function calcTotals(entries) {
  return (entries || []).reduce((a, e) => ({ cal: a.cal + (+e.cal || 0), prot: a.prot + (+e.prot || 0), carb: a.carb + (+e.carb || 0), fat: a.fat + (+e.fat || 0) }), { cal: 0, prot: 0, carb: 0, fat: 0 });
}

// ─── موتور محاسبه ──────────────────────────────────────────────────────────
function calculateMacros({ weight_kg, height_cm, age_years, gender, activity_days, target_weight_change, duration_months, diet_type }) {
  const bmr = gender === 'male'
    ? (10 * weight_kg) + (6.25 * height_cm) - (5 * age_years) + 5
    : (10 * weight_kg) + (6.25 * height_cm) - (5 * age_years) - 161;
  let multiplier;
  const days = Number(activity_days);
  if (days === 0) multiplier = 1.2;
  else if (days <= 2) multiplier = 1.375;
  else if (days <= 5) multiplier = 1.55;
  else multiplier = 1.725;
  const tdee = bmr * multiplier;
  const weeks = duration_months * 4.33;
  const weeklyRate = Math.abs(target_weight_change) / weeks;
  const dailyAdjustment = weeklyRate * 1100;
  let targetCalorie;
  if (target_weight_change < 0) targetCalorie = tdee - dailyAdjustment;
  else if (target_weight_change > 0) targetCalorie = tdee + dailyAdjustment;
  else targetCalorie = tdee;
  let warningTriggered = false, warningMessage = '';
  if (target_weight_change < 0 && weeklyRate > 1.0) { warningTriggered = true; warningMessage = 'نرخ کاهش وزن ناامن است (بیش از ۱ kg در هفته). کالری هدف به حداقل امن تنظیم شد.'; }
  const calFloor = gender === 'male' ? 1500 : 1200;
  if (targetCalorie < bmr || targetCalorie < calFloor) {
    const cap = Math.max(bmr, calFloor);
    targetCalorie = cap;
    if (!warningTriggered) { warningTriggered = true; warningMessage = 'کالری دریافتی خیلی کم بود و به حداقل امن (' + Math.round(cap) + ' kcal) تنظیم شد.'; }
  }
  let protGrams, carbGrams, fatGrams;
  if (diet_type === 'highprot' || diet_type === 'high_protein') { protGrams = (targetCalorie * 0.40) / 4; fatGrams = (targetCalorie * 0.25) / 9; carbGrams = (targetCalorie * 0.35) / 4; }
  else if (diet_type === 'lowcarb' || diet_type === 'low_carb') { protGrams = (targetCalorie * 0.35) / 4; fatGrams = (targetCalorie * 0.45) / 9; carbGrams = (targetCalorie * 0.20) / 4; }
  else if (diet_type === 'keto') { protGrams = (targetCalorie * 0.25) / 4; fatGrams = (targetCalorie * 0.70) / 9; carbGrams = Math.min((targetCalorie * 0.05) / 4, 50); }
  else { protGrams = (targetCalorie * 0.25) / 4; fatGrams = (targetCalorie * 0.30) / 9; carbGrams = (targetCalorie * 0.45) / 4; }
  // آب: ۳۰ ml به ازای هر کیلوگرم
  const waterMl = Math.round(weight_kg * 30 / 100) * 100;
  return { bmr: Math.round(bmr), tdee: Math.round(tdee), target_calories: Math.round(targetCalorie), protein_grams: Math.round(protGrams), carb_grams: Math.round(carbGrams), fat_grams: Math.round(fatGrams), water_ml: waterMl, warning_triggered: warningTriggered, warning_message: warningMessage };
}

// ─── کامپوننت RingCard ──────────────────────────────────────────────────────
function RingCard({ m }) {
  const pct = Math.min(m.val / m.target, 1);
  const rem = Math.max(m.target - m.val, 0);
  const over = m.val > m.target;
  const r = 24, circ = 2 * Math.PI * r, offset = circ * (1 - pct);
  return (
    <div className={"macro-ring-card " + m.key}>
      <svg width="60" height="60" viewBox="0 0 60 60">
        <circle fill="none" strokeWidth="5" cx="30" cy="30" r={r} stroke={m.bg} />
        <circle fill="none" strokeWidth="5" strokeLinecap="round" cx="30" cy="30" r={r}
          stroke={over ? 'var(--cal)' : m.color} strokeDasharray={circ} strokeDashoffset={offset}
          transform="rotate(-90 30 30)" style={{ transition: 'stroke-dashoffset 0.8s cubic-bezier(0.34,1.56,0.64,1)' }} />
        <text fontFamily="Playfair Display,serif" fontSize="11" fontWeight="600"
          x="30" y="30" textAnchor="middle" dominantBaseline="middle"
          fill={over ? 'var(--cal)' : m.color}>{Math.round(pct * 100)}%</text>
      </svg>
      <div className="ring-info">
        <div className="ring-label">{m.label}</div>
        <div className={"ring-remaining" + (over ? ' over-limit' : '')} style={{ color: over ? 'var(--cal)' : m.color }}>
          {over ? '+' + Math.abs(m.val - m.target) : rem} {m.unit}
        </div>
        <div className="ring-sub">{over ? 'از محدوده خارج شد' : 'باقی‌مانده'}</div>
        <div className="progress-bar-wrap">
          <div className="progress-bar-fill" style={{ width: (pct * 100) + '%', background: over ? 'var(--cal)' : m.color }} />
        </div>
      </div>
    </div>
  );
}

// ─── نمودارها ────────────────────────────────────────────────────────────────
function drawWeightChart(canvas, weightLog, setup) {
  if (!canvas || !setup) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const parent = canvas.parentElement;
  const rawW = parent ? (parent.clientWidth - 32) : 400;
  const W = rawW > 50 ? rawW : 400, H = 220;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr); ctx.clearRect(0, 0, W, H);
  const logs = Array.isArray(weightLog) ? weightLog : [];
  const startW = Number(setup.w) || 70;
  const endW = Number(setup.tw) || 65;
  const duration = Number(setup.duration) * 30 || 183;
  const startDate = new Date((setup.startDate || new Date().toISOString().split('T')[0]) + 'T12:00:00Z');
  const targetPoints = [];
  for (let d = 0; d <= duration; d += Math.max(1, Math.floor(duration / 20))) {
    targetPoints.push({ dayOffset: d, weight: startW + (endW - startW) * (d / duration) });
  }
  if (!logs.length && targetPoints.length < 2) {
    ctx.fillStyle = 'rgba(240,237,232,0.2)'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('هنوز داده‌ای وجود ندارد', W / 2, H / 2); return;
  }
  const allW = [...logs.map(l => l.weight), ...targetPoints.map(t => t.weight)].filter(Boolean);
  if (!allW.length) return;
  const minW = Math.min(...allW) - 1, maxW = Math.max(...allW) + 1;
  if (maxW === minW) return;
  const pad = { top: 20, right: 20, bottom: 40, left: 50 };
  const chartW = W - pad.left - pad.right, chartH = H - pad.top - pad.bottom;
  const xPos = d => pad.left + (Math.max(0, (new Date(d + 'T12:00:00Z') - startDate) / 86400000) / duration) * chartW;
  const yPos = w => pad.top + chartH - ((w - minW) / (maxW - minW)) * chartH;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (chartH / 4) * i, wL = (maxW - (maxW - minW) * (i / 4)).toFixed(1);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = 'rgba(240,237,232,0.35)'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(wL, 0, y + 4);
  }
  if (targetPoints.length >= 2) {
    ctx.strokeStyle = 'rgba(90,180,232,0.5)'; ctx.lineWidth = 1.5; ctx.setLineDash([6, 4]);
    ctx.beginPath();
    targetPoints.forEach((p, i) => { const x = pad.left + (p.dayOffset / duration) * chartW, y = yPos(p.weight); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
    ctx.stroke(); ctx.setLineDash([]);
  }
  if (logs.length >= 1) {
    const grad = ctx.createLinearGradient(0, pad.top, 0, H - pad.bottom);
    grad.addColorStop(0, 'rgba(201,168,76,0.25)'); grad.addColorStop(1, 'rgba(201,168,76,0)');
    ctx.beginPath();
    logs.forEach((l, i) => { const x = xPos(l.date), y = yPos(l.weight); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
    ctx.lineTo(xPos(logs[logs.length - 1].date), H - pad.bottom);
    ctx.lineTo(xPos(logs[0].date), H - pad.bottom); ctx.closePath();
    ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = '#c9a84c'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
    ctx.beginPath();
    logs.forEach((l, i) => { const x = xPos(l.date), y = yPos(l.weight); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
    ctx.stroke();
    logs.forEach(l => { const x = xPos(l.date), y = yPos(l.weight); ctx.beginPath(); ctx.arc(x, y, 4.5, 0, Math.PI * 2); ctx.fillStyle = '#c9a84c'; ctx.fill(); ctx.strokeStyle = '#0a0a0f'; ctx.lineWidth = 2; ctx.stroke(); });
    const last = logs[logs.length - 1];
    ctx.fillStyle = '#e8c97a'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(last.weight + 'kg', xPos(last.date), yPos(last.weight) - 12);
  }
}

function drawMacroChart(canvas, entries, targets) {
  if (!canvas || !targets) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const parent = canvas.parentElement;
  const rawW = parent ? (parent.clientWidth - 32) : 400;
  const W = rawW > 50 ? rawW : 400, H = 220;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr); ctx.clearRect(0, 0, W, H);
  const days = [];
  for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); days.push(d.toLocaleDateString('en-CA', { timeZone: 'Asia/Tehran' })); }
  const tg = targets;
  const series = { cal: { color: '#e8735a', data: [] }, prot: { color: '#5ab4e8', data: [] }, carb: { color: '#7de87a', data: [] }, fat: { color: '#e8b85a', data: [] } };
  days.forEach(day => {
    const e = (entries && entries[day]) || []; const t = calcTotals(e);
    series.cal.data.push(tg.cal > 0 ? Math.min(+(t.cal / tg.cal * 100).toFixed(1), 150) : 0);
    series.prot.data.push(tg.prot > 0 ? Math.min(+(t.prot / tg.prot * 100).toFixed(1), 150) : 0);
    series.carb.data.push(tg.carb > 0 ? Math.min(+(t.carb / tg.carb * 100).toFixed(1), 150) : 0);
    series.fat.data.push(tg.fat > 0 ? Math.min(+(t.fat / tg.fat * 100).toFixed(1), 150) : 0);
  });
  const pad = { top: 20, right: 20, bottom: 40, left: 40 };
  const chartW = W - pad.left - pad.right, chartH = H - pad.top - pad.bottom;
  const maxVal = 120, stepX = days.length > 1 ? chartW / (days.length - 1) : chartW;
  const yPos = v => pad.top + chartH - (v / maxVal) * chartH;
  [0, 25, 50, 75, 100].forEach(v => {
    const y = yPos(v);
    ctx.strokeStyle = v === 100 ? 'rgba(201,168,76,0.2)' : 'rgba(255,255,255,0.05)';
    ctx.lineWidth = v === 100 ? 1.5 : 1; ctx.setLineDash(v === 100 ? [4, 3] : []);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(240,237,232,0.3)'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(v + '%', 0, y + 4);
  });
  Object.values(series).forEach(s => {
    if (days.length < 2) return;
    ctx.strokeStyle = s.color; ctx.lineWidth = 2; ctx.lineJoin = 'round';
    ctx.beginPath();
    s.data.forEach((v, i) => { const x = pad.left + i * stepX, y = yPos(v); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
    ctx.stroke();
    s.data.forEach((v, i) => { ctx.beginPath(); ctx.arc(pad.left + i * stepX, yPos(v), 3.5, 0, Math.PI * 2); ctx.fillStyle = s.color; ctx.fill(); ctx.strokeStyle = '#0a0a0f'; ctx.lineWidth = 1.5; ctx.stroke(); });
  });
  days.forEach((day, i) => {
    try {
      const [jy, jm, jd] = gregorianToJalali(day);
      const ds = jd + ' ' + J_MONTH_NAMES[jm - 1].slice(0, 3);
      ctx.fillStyle = 'rgba(240,237,232,0.35)'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(ds, pad.left + i * stepX, H - pad.bottom + 16);
    } catch (e) { }
  });
}

function WeightChart({ weightLog, setup }) {
  const canvasRef = useRef(null);
  useEffect(() => { const t = setTimeout(() => drawWeightChart(canvasRef.current, weightLog, setup), 50); return () => clearTimeout(t); }, [weightLog, setup]);
  useEffect(() => { const h = () => drawWeightChart(canvasRef.current, weightLog, setup); window.addEventListener('resize', h); return () => window.removeEventListener('resize', h); }, [weightLog, setup]);
  return <canvas ref={canvasRef} height={220} />;
}

function MacroChart({ entries, targets }) {
  const canvasRef = useRef(null);
  useEffect(() => { const t = setTimeout(() => drawMacroChart(canvasRef.current, entries, targets), 50); return () => clearTimeout(t); }, [entries, targets]);
  useEffect(() => { const h = () => drawMacroChart(canvasRef.current, entries, targets); window.addEventListener('resize', h); return () => window.removeEventListener('resize', h); }, [entries, targets]);
  return <canvas ref={canvasRef} height={220} />;
}

// ─── محاسبه خودکار غذا / نوشیدنی ───────────────────────────────────────────
function SmartEntryTab({ onAdd, onAddWater, dateKey }) {
  const [mode, setMode] = useState('food'); // food | drink
  const [ingredientInput, setIngredientInput] = useState('');
  const [ingredients, setIngredients] = useState([]);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(false);
  const [meal, setMeal] = useState('lunch');
  const [editMacros, setEditMacros] = useState({ cal: '', prot: '', carb: '', fat: '', waterMl: '' });

  const addIngredient = () => {
    const v = ingredientInput.trim();
    if (!v) return;
    setIngredients(prev => [...prev, v]);
    setIngredientInput('');
    setResult(null);
  };

  const removeIngredient = (idx) => {
    setIngredients(prev => prev.filter((_, i) => i !== idx));
    setResult(null);
  };

  const estimate = async () => {
    if (!ingredients.length) return;
    setLoading(true); setError(false); setResult(null);
    const isDrink = mode === 'drink';
    const prompt = `تو یک متخصص تغذیه ایرانی هستی. ارزش غذایی ${isDrink ? 'نوشیدنی' : 'غذای'} زیر را تخمین بزن:
مواد: ${ingredients.join('، ')}

پاسخ را فقط به صورت JSON خالص بده، بدون توضیح یا backtick:
{"name":"نام فارسی ${isDrink ? 'نوشیدنی' : 'غذا'}","cal":0,"prot":0,"carb":0,"fat":0${isDrink ? ',"waterMl":0' : ''},"desc":"توضیح کوتاه فارسی"}

قوانین:
- مقادیر باید برای حجم/وزن معمول یک وعده باشد
- اعداد باید صحیح و واقعی باشند
- نام فارسی و توصیفی باشد${isDrink ? '\n- waterMl میزان آب کل موجود در نوشیدنی را به ml برآورد کن' : ''}`;
    try {
      const text = await callGemini(prompt);
      const clean = text.replace(/```json|```/g, '').trim();
      let parsed;
      try { parsed = JSON.parse(clean); }
      catch { const m = text.match(/\{[\s\S]*\}/); if (m) parsed = JSON.parse(m[0]); else throw new Error('parse fail'); }
      setResult(parsed);
      setEditMacros({ cal: String(parsed.cal || 0), prot: String(parsed.prot || 0), carb: String(parsed.carb || 0), fat: String(parsed.fat || 0), waterMl: String(parsed.waterMl || 0) });
    } catch (e) {
      setError(true);
    }
    setLoading(false);
  };

  const handleAdd = () => {
    if (!result) return;
    const name = result.name || ingredients.join(' + ');
    const added = onAdd(name, editMacros.cal, editMacros.prot, editMacros.carb, editMacros.fat, meal, mode);
    if (added) {
      // اگر نوشیدنی است و مقدار آب دارد، آب هم ثبت می‌شود
      if (mode === 'drink' && +editMacros.waterMl > 0 && onAddWater) {
        onAddWater(+editMacros.waterMl, dateKey);
      }
      setIngredients([]); setResult(null); setEditMacros({ cal: '', prot: '', carb: '', fat: '', waterMl: '' });
    }
  };

  return (
    <div className="card">
      <div className="card-title">محاسبه خودکار غذا ✦</div>

      {/* انتخاب نوع */}
      <div style={{ display: 'flex', gap: '10px', marginBottom: '20px' }}>
        <button className={"type-btn" + (mode === 'food' ? ' active' : '')} style={{ flex: 1 }} onClick={() => { setMode('food'); setResult(null); }}>
          <span className="type-icon">🍽️</span>غذا
        </button>
        <button className={"type-btn" + (mode === 'drink' ? ' active' : '')} style={{ flex: 1 }} onClick={() => { setMode('drink'); setResult(null); }}>
          <span className="type-icon">🥤</span>نوشیدنی
        </button>
      </div>

      {/* ورود مواد */}
      <div style={{ marginBottom: '16px' }}>
        <div style={{ fontSize: '11px', color: 'var(--text-muted)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: '10px' }}>
          {mode === 'drink' ? 'مواد نوشیدنی' : 'مواد غذایی'}
        </div>
        <div style={{ display: 'flex', gap: '8px' }}>
          <input type="text" value={ingredientInput}
            onChange={e => setIngredientInput(e.target.value)}
            placeholder={mode === 'drink' ? 'مثلاً: ۲۰۰ ml شیر، ۱ قاشق عسل…' : 'مثلاً: ۱۵۰g مرغ، ۱۰۰g برنج…'}
            onKeyDown={e => e.key === 'Enter' && addIngredient()}
            style={{ flex: 1 }} />
          <button className="btn-secondary" style={{ width: 'auto', marginTop: 0, padding: '0 16px' }} onClick={addIngredient}>+افزودن</button>
        </div>
        {ingredients.length > 0 && (
          <div className="ingredient-tag-row">
            {ingredients.map((ing, i) => (
              <span key={i} className="ingredient-tag">
                {ing}
                <button onClick={() => removeIngredient(i)}>✕</button>
              </span>
            ))}
          </div>
        )}
      </div>

      {ingredients.length > 0 && !result && !loading && (
        <button className="btn-primary" style={{ marginBottom: '8px' }} onClick={estimate}>
          ✦ محاسبه ارزش غذایی
        </button>
      )}

      {loading && <div className="ai-loading"><div className="ai-spinner">✦</div><div>در حال محاسبه…</div></div>}
      {error && <div className="empty-state"><div className="empty-icon">⚠️</div><div>خطا در محاسبه. دوباره امتحان کنید.</div></div>}

      {result && !loading && (
        <div className="smart-result-box">
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '10px' }}>
            <div style={{ fontFamily: 'Playfair Display,serif', fontSize: '16px', color: 'var(--gold-light)' }}>{result.name}</div>
            <button className="btn-ghost" style={{ fontSize: '11px', padding: '5px 10px' }} onClick={estimate}>↻ محاسبه مجدد</button>
          </div>
          {result.desc && <div style={{ fontSize: '12px', color: 'var(--text-muted)', marginBottom: '12px', lineHeight: 1.6 }}>{result.desc}</div>}

          {/* ماکروها قابل ویرایش */}
          <div style={{ fontSize: '11px', color: 'var(--gold)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: '8px' }}>ارزش غذایی (قابل ویرایش)</div>
          <div className="smart-result-macros">
            {[
              { k: 'cal', l: 'کالری', u: 'kcal', c: 'var(--cal)' },
              { k: 'prot', l: 'پروتئین', u: 'g', c: 'var(--prot)' },
              { k: 'carb', l: 'کربو', u: 'g', c: 'var(--carb)' },
              { k: 'fat', l: 'چربی', u: 'g', c: 'var(--fat)' },
            ].map(m => (
              <div key={m.k} className="smart-macro-box">
                <input type="number" value={editMacros[m.k]}
                  onChange={e => setEditMacros(p => ({ ...p, [m.k]: e.target.value }))}
                  style={{ background: 'transparent', border: 'none', color: m.c, fontFamily: 'Playfair Display,serif', fontSize: '18px', fontWeight: 600, textAlign: 'center', width: '100%', padding: '0', marginBottom: '3px' }}
                  min="0" />
                <div className="smart-macro-lbl">{m.l} ({m.u})</div>
              </div>
            ))}
          </div>
          {mode === 'drink' && (
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', background: 'var(--water-dim)', border: '1px solid rgba(56,189,248,0.2)', borderRadius: '8px', padding: '8px 12px', marginBottom: '12px' }}>
              <span style={{ color: 'var(--water)', fontSize: '18px' }}>💧</span>
              <span style={{ fontSize: '13px', color: 'var(--water)', flex: 1 }}>سهم آب:</span>
              <input type="number" value={editMacros.waterMl}
                onChange={e => setEditMacros(p => ({ ...p, waterMl: e.target.value }))}
                style={{ background: 'transparent', border: 'none', color: 'var(--water)', fontFamily: 'Playfair Display,serif', fontSize: '16px', fontWeight: 600, textAlign: 'left', width: '80px', padding: '0' }} min="0" />
              <span style={{ color: 'var(--water)', fontSize: '13px' }}>ml</span>
            </div>
          )}

          {/* انتخاب وعده */}
          <div style={{ marginBottom: '14px' }}>
            <div style={{ fontSize: '11px', color: 'var(--text-muted)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: '10px' }}>وعده</div>
            <div className="meal-grid">
              {MEAL_OPTIONS.map(m => (
                <button key={m.id} className={"meal-btn" + (meal === m.id ? ' active' : '')} onClick={() => setMeal(m.id)}>
                  <span className="meal-btn-icon">{m.icon}</span>
                  <span className="meal-btn-label">{m.label}</span>
                </button>
              ))}
            </div>
          </div>

          <button className="btn-primary" onClick={handleAdd}>ثبت در وعده‌های امروز ✦</button>
        </div>
      )}
    </div>
  );
}

function GoalTab({ state }) {
  if (!state || !state.setup || !state.targets) return null;
  const { setup, targets: tg, weightLog, startDate, entries } = state;
  const now = new Date();
  let start; try { start = new Date(startDate + 'T12:00:00Z'); } catch (e) { start = new Date(); }
  const { w, tw, goal, duration } = setup;
  const safeW = Number(w) || 0, safeTw = Number(tw) || 0, safeDur = Number(duration) || 6;
  const totalDays = Math.round(safeDur * 30.44);
  const daysPassed = Math.min(Math.max(Math.floor((now - start) / 86400000) + 1, 1), totalDays);
  const progress = totalDays > 0 ? daysPassed / totalDays : 0;
  const expectedNow = +(safeW + (safeTw - safeW) * progress).toFixed(1);
  const goalL = { cut: 'کاهش وزن', bulk: 'افزایش حجم', maintain: 'حفظ وزن' };
  const durL = { '1': '۱ ماه', '3': '۳ ماه', '6': '۶ ماه', '12': '۱۲ ماه' };
  const lastLog = (weightLog && weightLog.length) ? weightLog[weightLog.length - 1] : null;
  const rows = [['هدف', goalL[goal] || goal], ['مدت برنامه', durL[String(safeDur)] || safeDur + ' ماه'], ['وزن شروع', safeW + ' kg'], ['وزن هدف', safeTw + ' kg'], ['وزن ثبت‌شده آخر', lastLog ? lastLog.weight + ' kg' : '—'], ['وزن انتظاری تاکنون', expectedNow + ' kg']];
  return (
    <>
      <div className="card">
        <div className="card-title">پیشرفت کلی</div>
        {rows.map(([l, v]) => <div key={l} className="goal-row"><span className="goal-label">{l}</span><span className="goal-value">{v}</span></div>)}
        <div className="divider" />
        <div className="goal-row"><span className="goal-label">روزهای گذشته</span><span className="goal-value">{daysPassed} / {totalDays}</span></div>
        <div className="goal-bar-wrap"><div className="goal-bar-fill" style={{ width: (progress * 100) + '%' }} /></div>
        {[['متابولیسم پایه (BMR)', (tg.bmr || 0) + ' kcal'], ['کالری کل (TDEE)', (tg.tdee || 0) + ' kcal'], ['کالری هدف روزانه', (tg.cal || 0) + ' kcal'], ['پروتئین روزانه', (tg.prot || 0) + ' g'], ['کربوهیدرات روزانه', (tg.carb || 0) + ' g'], ['چربی روزانه', (tg.fat || 0) + ' g'], ['هدف آب روزانه', (tg.water || 0) + ' ml']].map(([l, v]) => (
          <div key={l} className="goal-row"><span className="goal-label">{l}</span><span className="goal-value">{v}</span></div>
        ))}
      </div>
      <div className="card">
        <div className="card-title">نمودار پیشرفت ماکرو (۷ روز اخیر)</div>
        <div className="chart-wrap"><MacroChart entries={entries || {}} targets={tg} /></div>
        <div className="chart-legend">
          {[['var(--cal)', 'کالری (% هدف)'], ['var(--prot)', 'پروتئین'], ['var(--carb)', 'کربو'], ['var(--fat)', 'چربی']].map(([c, l]) => (
            <div key={l} className="legend-item"><div className="legend-dot" style={{ background: c }} />{l}</div>
          ))}
        </div>
      </div>
    </>
  );
}

const ENERGY_SLOTS = [
  { id: 'morning', label: 'انرژی صبح', icon: '🌅' },
  { id: 'evening', label: 'انرژی شب', icon: '🌙' },
  { id: 'pre_workout', label: 'قبل تمرین', icon: '💪' },
  { id: 'during_workout', label: 'حین تمرین', icon: '🏋️' },

function EnergyTrackerPage({ energyLog, onSaveEnergy, onDeleteEnergy }) {
  const todayKey_ = todayKey();
  const todayEntry = energyLog[todayKey_] || {};
  const [localVals, setLocalVals] = useState(() => {
    const init = {};
    ENERGY_SLOTS.forEach(s => { init[s.id] = todayEntry[s.id] ?? ''; });
    return init;
  });
  const [activeTab, setActiveTab] = useState('today');

  useEffect(() => {
    const e = energyLog[todayKey_] || {};
    const init = {};
    ENERGY_SLOTS.forEach(s => { init[s.id] = e[s.id] ?? ''; });
    setLocalVals(init);
  }, [energyLog, todayKey_]);

  const saveSlot = (slotId, val) => {
    const v = val === '' ? undefined : Number(val);
    const updated = { ...(energyLog[todayKey_] || {}) };
    if (v === undefined) delete updated[slotId];
    else updated[slotId] = v;
    onSaveEnergy(todayKey_, updated);
  };

  const historyDays = Object.keys(energyLog).sort((a, b) => b.localeCompare(a)).slice(0, 30);

  // محاسبه میانگین هر اسلات
  const slotAvgs = {};
  ENERGY_SLOTS.forEach(s => {
    const vals = historyDays.map(d => energyLog[d]?.[s.id]).filter(v => v !== undefined && v !== null);
    slotAvgs[s.id] = vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : null;
  });

  return (
    <div className="page-fade">
      <div className="page-header">
        <div className="page-title">رهگیر انرژی ⚡</div>
        <div className="page-sub">ثبت سطح انرژی روزانه (اختیاری)</div>
      </div>
      <div className="tabs">
        <button className={"tab" + (activeTab === 'today' ? ' active' : '')} onClick={() => setActiveTab('today')}>امروز</button>
        <button className={"tab" + (activeTab === 'history' ? ' active' : '')} onClick={() => setActiveTab('history')}>تاریخچه</button>
        <button className={"tab" + (activeTab === 'stats' ? ' active' : '')} onClick={() => setActiveTab('stats')}>آمار</button>
      </div>

      {activeTab === 'today' && (
        <div className="card">
          <div className="card-title">⚡ ثبت انرژی امروز</div>
          <div style={{ fontSize: '12px', color: 'var(--text-muted)', marginBottom: '16px' }}>
            هر اسلات اختیاری است. مقیاس ۱ (خیلی کم) تا ۱۰ (عالی)
          </div>
          <div className="energy-grid">
            {ENERGY_SLOTS.map(slot => {
              const val = localVals[slot.id];
              const hasVal = val !== '' && val !== undefined;
              return (
                <div key={slot.id} className={"energy-slot" + (hasVal ? ' tracked' : '')}>
                  <div className="energy-slot-label">{slot.icon} {slot.label}</div>
                  {hasVal
                    ? <div className="energy-slot-val">{val}</div>
                    : <div style={{ fontSize: '12px', color: 'var(--text-muted)', marginBottom: '4px' }}>ثبت نشده</div>
                  }
                  <div className="energy-slider-wrap">
                    <input type="range" className="energy-slider" min="1" max="10" step="1"
                      value={hasVal ? val : 5}
                      onChange={e => {
                        const v = e.target.value;
                        setLocalVals(p => ({ ...p, [slot.id]: v }));
                        saveSlot(slot.id, v);
                      }}
                      style={{ background: hasVal ? `linear-gradient(to right, #a78bfa ${(val-1)/9*100}%, var(--border) ${(val-1)/9*100}%)` : undefined }}
                    />
                  </div>
                  {hasVal && (
                    <button onClick={() => { setLocalVals(p => ({ ...p, [slot.id]: '' })); saveSlot(slot.id, ''); }}
                      style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: '11px', marginTop: '4px' }}>
                      حذف ✕
                    </button>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {activeTab === 'history' && (
        <div className="card">
          <div className="card-title">📅 تاریخچه انرژی</div>
          {historyDays.length === 0
            ? <div className="empty-state"><div className="empty-icon">⚡</div><div>هنوز انرژی‌ای ثبت نشده</div></div>
            : historyDays.map(d => {
              const e = energyLog[d] || {};
              const hasAny = ENERGY_SLOTS.some(s => e[s.id] !== undefined);
              if (!hasAny) return null;
              return (
                <div key={d} className="energy-history-item">
                  <span className="energy-date">{formatJalali(d, { short: true })}</span>
                  <div className="energy-chips">
                    {ENERGY_SLOTS.filter(s => e[s.id] !== undefined).map(s => (
                      <span key={s.id} className="energy-chip">{s.icon} {e[s.id]}</span>
                    ))}
                  </div>
                  <button className="entry-del" onClick={() => onDeleteEnergy(d)}>✕</button>
                </div>
              );
            })
          }
        </div>
      )}

      {activeTab === 'stats' && (
        <div className="card">
          <div className="card-title">📊 میانگین انرژی (۳۰ روز اخیر)</div>
          {ENERGY_SLOTS.map(s => {
            const avg = slotAvgs[s.id];
            if (!avg) return null;
            return (
              <div key={s.id} className="energy-avg-bar">
                <div className="energy-avg-label">{s.icon} {s.label}</div>
                <div className="energy-avg-track">
                  <div className="energy-avg-fill" style={{ width: (avg / 10 * 100) + '%' }} />
                </div>
                <span style={{ fontSize: '14px', color: '#a78bfa', fontFamily: 'Playfair Display,serif', minWidth: '28px', textAlign: 'left' }}>{avg}</span>

            );

          {!ENERGY_SLOTS.some(s => slotAvgs[s.id]) && (
            <div className="empty-state"><div className="empty-icon">📊</div><div>داده کافی برای نمایش آمار وجود ندارد</div></div>

      )}
    </div>
  );
}

function WaterTracking({ waterLog, waterTarget, dateKey, onAddWater, onDeleteWater }) {
  const todayWater = (waterLog[dateKey] || []).reduce((s, e) => s + (e.ml || 0), 0);
  const remaining = Math.max(waterTarget - todayWater, 0);
  const pct = Math.min(todayWater / (waterTarget || 1), 1);
  const [custom, setCustom] = useState('');
  return (
    <div className="card">
      <div className="card-title">ردیابی آب 💧</div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
        <div>
          <div style={{ fontSize: '28px', fontFamily: 'Playfair Display,serif', color: 'var(--water)', fontWeight: 600 }}>{todayWater} <span style={{ fontSize: '14px', color: 'var(--text-muted)' }}>ml</span></div>
          <div style={{ fontSize: '12px', color: 'var(--text-muted)', marginTop: '4px' }}>از {waterTarget} ml · {remaining} ml باقی‌مانده</div>
        </div>
        <svg width="64" height="64" viewBox="0 0 64 64">
          <circle fill="none" strokeWidth="5" cx="32" cy="32" r="26" stroke="var(--water-dim)" />
          <circle fill="none" strokeWidth="5" strokeLinecap="round" cx="32" cy="32" r="26"
            stroke="var(--water)" strokeDasharray={2 * Math.PI * 26} strokeDashoffset={2 * Math.PI * 26 * (1 - pct)}
            transform="rotate(-90 32 32)" style={{ transition: 'stroke-dashoffset 0.8s ease' }} />
          <text fontFamily="Playfair Display,serif" fontSize="12" fontWeight="600" x="32" y="32" textAnchor="middle" dominantBaseline="middle" fill="var(--water)">{Math.round(pct * 100)}%</text>
        </svg>
      </div>
      <div className="water-bar-outer"><div className="water-bar-inner" style={{ width: (pct * 100) + '%' }} /></div>
      <div className="water-btns">
        {[100, 250, 500, 1000].map(ml => (
          <button key={ml} className="water-btn" onClick={() => onAddWater(ml, dateKey)}>+{ml} ml</button>
        ))}
      </div>
      <div style={{ display: 'flex', gap: '8px', marginTop: '12px' }}>
        <input type="number" value={custom} onChange={e => setCustom(e.target.value)} placeholder="مقدار دلخواه (ml)" style={{ flex: 1 }} min="1" />
        <button className="btn-secondary" style={{ width: 'auto', marginTop: 0 }} onClick={() => { if (+custom > 0) { onAddWater(+custom, dateKey); setCustom(''); } }}>ثبت</button>
      </div>
      {(waterLog[dateKey] || []).length > 0 && (
        <div style={{ marginTop: '16px' }}>
          <div className="divider" />
          <div style={{ fontSize: '12px', color: 'var(--gold)', letterSpacing: '0.08em', marginBottom: '8px' }}>ثبت‌های امروز</div>
          {[...(waterLog[dateKey] || [])].reverse().map((e, i) => (
            <div key={i} className="entry-item">
              <span className="entry-name">{e.label || 'آب'}</span>
              <span className="chip water">💧 {e.ml} ml</span>
              <button className="entry-del" onClick={() => onDeleteWater(dateKey, i)}>✕</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function TrainingRegisterTab({ onSaveExercise, onSaveRun, exerciseMemory }) {
  // فرم تمرین قدرتی
  const [ef, setEf] = useState({
    name: '', muscle: 'سینه', sets: '', reps: '', notes: '',
    // وزن پیشرفته
    weightType: 'normal', weight: '', leftWeight: '', rightWeight: '', upWeight: '', downWeight: '',
    // شاخص‌های پیشرفته
    muscleStress: '', failureProx: '', execQuality: '',
  });
  const [eSugg, setESugg] = useState([]);
  const updE = (k, v) => setEf(p => ({ ...p, [k]: v }));
  const handleEName = (v) => {
    updE('name', v);
    setESugg(v.length > 0 ? exerciseMemory.filter(e => e.toLowerCase().includes(v.toLowerCase())).slice(0, 5) : []);
  };

  const WEIGHT_TYPES = [
    { id: 'normal', label: 'وزن عادی' },
    { id: 'each_hand', label: 'وزن هر دست' },
    { id: 'machine_updown', label: 'بالا/پایین دستگاه' },
    { id: 'side_lr', label: 'راست/چپ' },
  ];

  const buildWeightData = () => {
    if (ef.weightType === 'each_hand') return { type: 'each_hand', left: ef.leftWeight ? +ef.leftWeight : null, right: ef.rightWeight ? +ef.rightWeight : null };
    if (ef.weightType === 'machine_updown') return { type: 'machine_updown', up: ef.upWeight ? +ef.upWeight : null, down: ef.downWeight ? +ef.downWeight : null };
    if (ef.weightType === 'side_lr') return { type: 'side_lr', left: ef.leftWeight ? +ef.leftWeight : null, right: ef.rightWeight ? +ef.rightWeight : null };
    return null;
  };
  const getMainWeight = () => {
    if (ef.weightType === 'normal') return ef.weight ? +ef.weight : null;
    if (ef.weightType === 'each_hand') return ef.leftWeight || ef.rightWeight ? Math.max(+ef.leftWeight || 0, +ef.rightWeight || 0) : null;
    if (ef.weightType === 'machine_updown') return ef.upWeight ? +ef.upWeight : null;
    if (ef.weightType === 'side_lr') return ef.rightWeight || ef.leftWeight ? Math.max(+ef.rightWeight || 0, +ef.leftWeight || 0) : null;
    return null;
  };

  const submitExercise = () => {
    if (!ef.name.trim() || !ef.sets || !ef.reps) return;
    const weightData = buildWeightData();
    const mainWeight = getMainWeight();
    const entry = {
      name: ef.name.trim(),
      muscle: ef.muscle,
      sets: +ef.sets,
      reps: +ef.reps,
      weight: mainWeight,
      weightData,
      notes: ef.notes,
      date: todayKey(),
      ts: Date.now(),
    };
    if (ef.muscleStress !== '') entry.muscleStress = +ef.muscleStress;
    if (ef.failureProx !== '') entry.failureProx = +ef.failureProx;
    if (ef.execQuality !== '') entry.execQuality = +ef.execQuality;
    onSaveExercise(entry);
    setEf({ name: '', muscle: 'سینه', sets: '', reps: '', notes: '', weightType: 'normal', weight: '', leftWeight: '', rightWeight: '', upWeight: '', downWeight: '', muscleStress: '', failureProx: '', execQuality: '' });
    setESugg([]);
  };

  // فرم پیاده‌روی / دویدن
  const [rf, setRf] = useState({ duration: '', distance: '', steps: '', hr: '', cal: '' });
  const updR = (k, v) => setRf(p => ({ ...p, [k]: v }));
  const submitRun = () => {
    if (!rf.duration || !rf.distance) return;
    onSaveRun({
      duration: +rf.duration,
      distance: +rf.distance,
      steps: rf.steps ? +rf.steps : null,
      hr: rf.hr ? +rf.hr : null,
      cal: rf.cal ? +rf.cal : null,
      date: todayKey(),
      ts: Date.now()
    });
    setRf({ duration: '', distance: '', steps: '', hr: '', cal: '' });
  };

  return (
    <div>
      <div className="card">
        <div className="card-title">🏋️ ثبت تمرین قدرتی</div>
        <div className="form-grid">
          <div className="field" style={{ position: 'relative' }}>
            <label className="lbl">نام حرکت *</label>
            <input type="text" value={ef.name} onChange={e => handleEName(e.target.value)} placeholder="مثلاً پرس سینه" />
            {eSugg.length > 0 && (
              <div className="autocomplete-list">
                {eSugg.map((s, i) => <div key={i} className="autocomplete-item" onClick={() => { updE('name', s); setESugg([]); }}>{s}</div>)}
              </div>
            )}
          </div>
          <div className="field">
            <label className="lbl">عضله هدف</label>
            <select value={ef.muscle} onChange={e => updE('muscle', e.target.value)}>
              {MUSCLE_OPTIONS.map(m => <option key={m} value={m}>{m}</option>)}
            </select>
          </div>
          <div className="field"><label className="lbl">ست *</label><input type="number" value={ef.sets} onChange={e => updE('sets', e.target.value)} placeholder="۳" min="1" /></div>
          <div className="field"><label className="lbl">تکرار *</label><input type="number" value={ef.reps} onChange={e => updE('reps', e.target.value)} placeholder="۱۲" min="1" /></div>
          <div className="field"><label className="lbl">یادداشت — اختیاری</label><input type="text" value={ef.notes} onChange={e => updE('notes', e.target.value)} placeholder="..." /></div>
        </div>

        {/* نوع ورودی وزن */}
        <div style={{ marginBottom: '12px', marginTop: '4px' }}>
          <div className="lbl" style={{ marginBottom: '8px', display: 'block' }}>نوع وزن</div>
          <div className="weight-type-tabs">
            {WEIGHT_TYPES.map(wt => (
              <button key={wt.id} className={"weight-type-btn" + (ef.weightType === wt.id ? ' active' : '')} onClick={() => updE('weightType', wt.id)}>{wt.label}</button>
            ))}
          </div>
        </div>

        {ef.weightType === 'normal' && (
          <div className="field" style={{ marginBottom: '12px' }}>
